<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horário Semanal de Aulas</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        .search-container {
            margin-bottom: 30px;
            text-align: center;
        }

        #teacherSearch {
            padding: 12px 20px;
            width: 100%;
            max-width: 400px;
            border-radius: 25px;
            border: 1px solid #ddd;
            font-size: 16px;
            outline: none;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .week-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .day-column {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .day-header {
            background-color: var(--primary-color);
            color: white;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .class-card {
            border-left: 4px solid var(--accent-color);
            background: #f9f9f9;
            padding: 10px;
            margin-bottom: 10px;
            font-size: 0.9em;
            transition: transform 0.2s;
        }

        .class-card:hover {
            transform: scale(1.02);
        }

        .time { font-weight: bold; color: var(--primary-color); }
        .subject { display: block; margin: 5px 0; font-weight: 600; }
        .teacher { color: #666; font-style: italic; }
        .room { font-size: 0.8em; color: var(--accent-color); float: right; }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Horários de Aula</h1>
        <p id="week-range">Carregando período...</p>
    </header>

    <div class="search-container">
        <input type="text" id="teacherSearch" placeholder="Pesquisar por nome do professor..." onkeyup="filterTeachers()">
    </div>

    <div class="week-grid" id="schedule-grid">
        </div>
</div>

<script>
    // URL da sua planilha em formato CSV
    const sheetId = '1j33kiPqwtzZNuvkBgYDaIiXZvVMY_J0qWAtRfYGdnD8';
    const gid = '1357770092';
    const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&gid=${gid}`;

    async function fetchData() {
        try {
            const response = await fetch(csvUrl);
            const data = await response.text();
            processData(data);
        } catch (error) {
            console.error("Erro ao carregar dados:", error);
            document.getElementById('schedule-grid').innerHTML = "Erro ao carregar a planilha. Verifique se ela está pública.";
        }
    }

    function processData(csvData) {
        const rows = csvData.split('\n').map(row => row.split(','));
        const grid = document.getElementById('schedule-grid');
        grid.innerHTML = '';

        const days = ["Segunda", "Terça", "Quarta", "Quinta", "Sexta"];
        
        // Estrutura para organizar os dias
        const schedule = { "Segunda": [], "Terça": [], "Quarta": [], "Quinta": [], "Sexta": [] };

        // Pula o cabeçalho e processa linhas
        // Ajuste os índices [0, 1, 2...] conforme a ordem das colunas na sua planilha real
        for (let i = 1; i < rows.length; i++) {
            const [dia, horario, materia, professor, turma, sala] = rows[i];
            if (schedule[dia]) {
                schedule[dia].push({ horario, materia, professor, turma, sala });
            }
        }

        days.forEach(day => {
            const dayDiv = document.createElement('div');
            dayDiv.className = 'day-column';
            dayDiv.innerHTML = `<div class="day-header">${day}</div>`;

            schedule[day].forEach(item => {
                const card = document.createElement('div');
                card.className = 'class-card';
                card.setAttribute('data-teacher', item.professor.toLowerCase());
                card.innerHTML = `
                    <span class="room">${item.sala || ''}</span>
                    <span class="time">${item.horario}</span>
                    <span class="subject">${item.materia} - ${item.turma}</span>
                    <span class="teacher">${item.professor}</span>
                `;
                dayDiv.appendChild(card);
            });

            grid.appendChild(dayDiv);
        });
    }

    function filterTeachers() {
        const input = document.getElementById('teacherSearch').value.toLowerCase();
        const cards = document.querySelectorAll('.class-card');

        cards.forEach(card => {
            const teacherName = card.getAttribute('data-teacher');
            if (teacherName.includes(input)) {
                card.classList.remove('hidden');
            } else {
                card.classList.add('hidden');
            }
        });
    }

    // Inicializa a busca dos dados
    fetchData();
</script>

</body>
</html>
