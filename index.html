<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Horários IFRO</title>
    <style>
        :root { --primary: #2e7d32; --secondary: #fbc02d; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        
        .controls-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 30px; display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; align-items: center; }
        select { padding: 10px; border-radius: 8px; border: 1px solid #ddd; font-size: 14px; min-width: 200px; }
        .search-box { padding: 10px; border-radius: 8px; border: 1px solid #ddd; width: 250px; }

        .week-container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: var(--primary); text-align: center; margin-top: 0; }

        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 1200px; font-size: 12px; }
        th, td { border: 1px solid #eee; padding: 10px; text-align: center; }
        
        th { background: var(--primary); color: white; position: sticky; top: 0; }
        .day-divider { background: #e8f5e9; font-weight: bold; color: var(--primary); text-align: left; padding-left: 15px; font-size: 14px; }
        .time-col { font-weight: bold; width: 120px; background: #fafafa; }
        
        .highlight { background-color: var(--secondary) !important; font-weight: bold; color: #000; }
        .intervalo { background: #f5f5f5; color: #888; font-style: italic; }
    </style>
</head>
<body>

<div class="controls-card">
    <div>
        <label>Modalidade: </label>
        <select id="selectModalidade" onchange="processarDados()">
            <option value="INTEGRADO">ENSINO INTEGRADO</option>
            <option value="SUPERIOR 1">SUPERIOR 1</option>
            <option value="SUPERIOR 2">SUPERIOR 2</option>
        </select>
    </div>
    <div>
        <label>Semana: </label>
        <select id="selectSemana" onchange="renderizarTabela()"></select>
    </div>
    <input type="text" id="searchProf" class="search-box" placeholder="🔍 Filtrar Professor..." onkeyup="filtrarProfessor()">
</div>

<div class="week-container">
    <h2 id="tituloSemana">Selecione uma semana</h2>
    <div id="tabelaHorario" class="table-wrapper"></div>
</div>

<script>
    const sheetID = '1j33kiPqwtzZNuvkBgYDaIiXZvVMY_J0qWAtRfYGdnD8';
    const gid = '1357770092';
    const url = `https://docs.google.com/spreadsheets/d/${sheetID}/export?format=csv&gid=${gid}`;

    let dadosGlobais = [];
    let turmasGlobais = [];
    let semanasAgrupadas = {};

    async function init() {
        try {
            const response = await fetch(url);
            const csv = await response.text();
            dadosGlobais = csv.split('\n').map(r => r.split(','));
            processarDados();
        } catch (e) {
            console.error("Erro ao carregar dados", e);
        }
    }

    function getMonday(dateStr) {
        const parts = dateStr.split('/');
        const d = new Date(parts[2], parts[1] - 1, parts[0]);
        const day = d.getDay(), diff = d.getDate() - day + (day === 0 ? -6 : 1);
        return new Date(d.setDate(diff)).toLocaleDateString('pt-BR');
    }

    function processarDados() {
        const modalidade = document.getElementById('selectModalidade').value;
        semanasAgrupadas = {};
        
        // Na sua planilha, a Linha 1 tem as turmas
        turmasGlobais = dadosGlobais[0].slice(2).filter(t => t.trim() !== "");

        for (let i = 1; i < dadosGlobais.length; i++) {
            const row = dadosGlobais[i];
            const data = row[0].trim();
            if (!data || data === "") continue;

            const segunda = getMonday(data);
            if (!semanasAgrupadas[segunda]) semanasAgrupadas[segunda] = [];
            semanasAgrupadas[segunda].push(row);
        }

        // Preencher o Select de Semanas
        const selectSemana = document.getElementById('selectSemana');
        selectSemana.innerHTML = "";
        Object.keys(semanasAgrupadas).sort().forEach(s => {
            let opt = document.createElement('option');
            opt.value = s;
            opt.textContent = `Semana de ${s}`;
            selectSemana.appendChild(opt);
        });

        renderizarTabela();
    }

    function renderizarTabela() {
        const semanaAlvo = document.getElementById('selectSemana').value;
        const dadosSemana = semanasAgrupadas[semanaAlvo];
        const container = document.getElementById('tabelaHorario');
        document.getElementById('tituloSemana').textContent = `Horário Completo - Semana ${semanaAlvo}`;

        let html = `<table><thead><tr><th>Horário</th>`;
        turmasGlobais.forEach(t => html += `<th>${t}</th>`);
        html += `</tr></thead><tbody>`;

        let diaAtual = "";

        dadosSemana.forEach(row => {
            const dataRow = row[0];
            const horaRow = row[1];

            // Se mudou o dia, insere a linha divisória do dia (SEGUNDA, TERÇA...)
            if (dataRow !== diaAtual) {
                diaAtual = dataRow;
                html += `<tr class="day-divider"><td colspan="${turmasGlobais.length + 1}">${diaAtual}</td></tr>`;
            }

            const isIntervalo = horaRow.toUpperCase().includes("INTERVALO");
            html += `<tr class="${isIntervalo ? 'intervalo' : ''}">`;
            html += `<td class="time-col">${horaRow}</td>`;

            for (let j = 2; j < (turmasGlobais.length + 2); j++) {
                const conteudo = row[j] ? row[j].trim() : "-";
                html += `<td class="aula-cell">${conteudo}</td>`;
            }
            html += `</tr>`;
        });

        html += `</tbody></table>`;
        container.innerHTML = html;
    }

    function filtrarProfessor() {
        const termo = document.getElementById('searchProf').value.toUpperCase();
        document.querySelectorAll('.aula-cell').forEach(c => {
            if (termo !== "" && c.innerText.toUpperCase().includes(termo)) {
                c.classList.add('highlight');
            } else {
                c.classList.remove('highlight');
            }
        });
    }

    window.onload = init;
</script>

</body>
</html>
