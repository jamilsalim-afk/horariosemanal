<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade IFRO - Correção de Renderização</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-size: 10px; font-family: 'Inter', sans-serif; }
        .table-grade { table-layout: fixed; width: 100%; border-collapse: collapse; }
        
        /* Ajuste do Header Sticky para não cobrir a primeira linha */
        .dia-header { position: sticky; top: 0; z-index: 40; background: #166534; color: white; padding: 4px; font-weight: bold; text-align: center; height: 25px; }
        .turmas-header { position: sticky; top: 25px; z-index: 30; background: #f3f4f6; height: 25px; }
        
        /* Células e Cards */
        td { border: 1px solid #e5e7eb; vertical-align: top; height: 40px; padding: 1px; }
        th { border: 1px solid #e5e7eb; font-size: 9px; }
        
        .aula-card { 
            border-left: 2px solid #166534;
            padding: 2px;
            margin: 1px;
            background-color: #f0fdf4;
            line-height: 1.1;
        }
        .disc-label { font-weight: 800; color: #14532d; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .prof-label { color: #1d4ed8; font-size: 8px; display: block; }
        
        .col-horario { width: 55px; background: #f9fafb; text-align: center; font-weight: bold; font-size: 8px; color: #6b7280; }
        .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.8); display: none; justify-content: center; align-items: center; z-index: 100; }
    </style>
</head>
<body class="bg-gray-100 p-1">

    <div id="loading" class="loading-overlay"><div class="animate-spin rounded-full h-8 w-8 border-b-2 border-green-700"></div></div>

    <div class="bg-white p-2 rounded shadow-sm mb-4 flex flex-wrap gap-2 items-end">
        <div class="flex gap-2">
            <input type="week" id="weekInput" onchange="renderizar()" class="border rounded p-1 text-[10px]">
            <select id="nivelSelect" onchange="renderizar()" class="border rounded p-1 text-[10px]">
                <option value="tecnico">Técnico</option>
                <option value="superior">Superior</option>
            </select>
        </div>
        <input type="text" id="buscaProf" oninput="renderizar()" placeholder="Filtrar professor..." class="border rounded p-1 text-[10px] flex-grow">
        <button onclick="fetchData()" class="bg-green-700 text-white px-3 py-1 rounded text-[10px] font-bold">Sincronizar</button>
    </div>

    <div id="gradeContainer" class="space-y-6"></div>

    <script>
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/1j33kiPqwtzZNuvkBgYDaIiXZvVMY_J0qWAtRfYGdnD8/export?format=csv&gid=1589791808';
        let rawData = [];

        const GABARITO = [
            { start: "07:30", label: "07:30 - 08:20", type: "aula" },
            { start: "08:20", label: "08:20 - 09:10", type: "aula" },
            { start: "09:10", label: "INTERVALO", type: "break" },
            { start: "09:30", label: "09:30 - 10:20", type: "aula" },
            { start: "10:20", label: "10:20 - 11:10", type: "aula" },
            { start: "11:10", label: "11:10 - 12:00", type: "aula" },
            { start: "12:00", label: "ALMOÇO", type: "break" },
            { start: "13:50", label: "13:50 - 14:40", type: "aula" },
            { start: "14:40", label: "14:40 - 15:30", type: "aula" },
            { start: "15:30", label: "INTERVALO", type: "break" },
            { start: "15:50", label: "15:50 - 16:40", type: "aula" },
            { start: "16:40", label: "16:40 - 17:30", type: "aula" },
            { start: "17:30", label: "17:30 - 18:20", type: "aula" },
            { start: "18:20", label: "JANTAR", type: "break" },
            { start: "19:00", label: "19:00 - 19:50", type: "aula" },
            { start: "19:50", label: "19:50 - 20:40", type: "aula" },
            { start: "20:40", label: "INTERVALO", type: "break" },
            { start: "20:50", label: "20:50 - 21:40", type: "aula" },
            { start: "21:40", label: "21:40 - 22:30", type: "aula" }
        ];

        async function fetchData() {
            document.getElementById('loading').style.display = 'flex';
            try {
                const res = await fetch(SHEET_URL);
                const csv = await res.text();
                const lines = csv.split('\n').map(line => line.split(','));
                
                // Limpeza e processamento (Lógica corrigida: Lista Plana)
                rawData = lines.slice(100).filter(l => l[0] && l[2]).map(l => ({
                    date: formatarData(l[0]),
                    time: l[1].trim().replace(/\s+/g, ''),
                    turma: l[2].trim().replace(/"/g, ''),
                    disc: l[3].trim().replace(/"/g, ''),
                    prof: (l[4] || "A Definir").trim().replace(/"/g, '')
                }));
                renderizar();
            } catch (e) { alert("Erro ao carregar dados."); }
            finally { document.getElementById('loading').style.display = 'none'; }
        }

        function formatarData(str) {
            const p = str.includes('/') ? str.split('/') : str.split('-');
            if(p.length < 3) return "";
            return `${p[2].length === 2 ? '20'+p[2] : p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}`;
        }

        function renderizar() {
            const weekVal = document.getElementById("weekInput").value;
            if (!weekVal) return;

            const [ano, sem] = weekVal.split("-W").map(Number);
            const segunda = getMonday(sem, ano);
            const nivel = document.getElementById("nivelSelect").value;
            const busca = document.getElementById("buscaProf").value.toLowerCase();

            // Identificar turmas únicas do nível selecionado
            const turmas = [...new Set(rawData.map(d => d.turma))]
                .filter(t => nivel === "superior" ? /ads|pos|super|gestao/i.test(t) : !/ads|pos|super|gestao/i.test(t))
                .sort();

            let html = "";
            const dias = ["SEGUNDA", "TERÇA", "QUARTA", "QUINTA", "SEXTA", "SÁBADO"];

            for (let i = 0; i < 6; i++) {
                const diaAtual = new Date(segunda);
                diaAtual.setDate(segunda.getDate() + i);
                const dataRef = diaAtual.toISOString().split('T')[0];

                html += `
                <div class="bg-white rounded shadow-md overflow-hidden">
                    <div class="dia-header uppercase">${dias[i]} - ${diaAtual.toLocaleDateString('pt-BR')}</div>
                    <div class="overflow-x-auto">
                        <table class="table-grade">
                            <thead>
                                <tr class="turmas-header">
                                    <th class="col-horario">Horário</th>
                                    ${turmas.map(t => `<th class="truncate p-1">${t}</th>`).join("")}
                                </tr>
                            </thead>
                            <tbody>
                                ${gerarCorpo(turmas, dataRef, busca, nivel)}
                            </tbody>
                        </table>
                    </div>
                </div>`;
            }
            document.getElementById("gradeContainer").innerHTML = html;
        }

        function gerarCorpo(turmas, dataRef, busca, nivel) {
            const slots = nivel === "tecnico" ? GABARITO.filter(s => s.start < "18:20") : GABARITO;

            return slots.map(slot => {
                if (slot.type === "break") {
                    return `<tr class="bg-gray-50"><td class="col-horario">${slot.start}</td><td colspan="${turmas.length}" class="text-center font-bold text-gray-300 text-[8px] italic tracking-widest">${slot.label}</td></tr>`;
                }

                return `<tr>
                    <td class="col-horario">${slot.label}</td>
                    ${turmas.map(t => {
                        // Busca todas as aulas que batem com DATA, TURMA e HORÁRIO
                        const aulas = rawData.filter(a => a.dataKey === dataRef && a.turma === t && a.time.includes(slot.start));
                        let cellHtml = "";
                        
                        aulas.forEach(a => {
                            if (!busca || a.prof.toLowerCase().includes(busca)) {
                                cellHtml += `<div class="aula-card"><span class="disc-label">${a.disc}</span><span class="prof-label">${a.prof}</span></div>`;
                            }
                        });
                        return `<td>${cellHtml}</td>`;
                    }).join("")}
                </tr>`;
            }).join("");
        }

        function getMonday(w, y) {
            const simple = new Date(y, 0, 1 + (w - 1) * 7);
            const dow = simple.getDay();
            const ISOweekStart = simple;
            if (dow <= 4) ISOweekStart.setDate(simple.getDate() - simple.getDay() + 1);
            else ISOweekStart.setDate(simple.getDate() + 8 - simple.getDay());
            return ISOweekStart;
        }
    </script>
</body>
</html>
