<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horário IFRO - Integrado</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --verde-ifro: #32a041; --cinza-header: #f2f2f2; }
        body { font-family: 'Arial Narrow', Arial, sans-serif; margin: 5px; background: #fff; }
        
        .no-print { display: flex; gap: 10px; padding: 10px; background: #f8f9fa; border-bottom: 2px solid var(--verde-ifro); margin-bottom: 10px; }
        button { background: var(--verde-ifro); color: white; border: none; padding: 8px 15px; cursor: pointer; font-weight: bold; border-radius: 4px; }

        .header-tabela { text-align: center; font-weight: bold; font-size: 13px; margin-bottom: 5px; color: #1b5e20; text-transform: uppercase; }

        table { width: 100%; border-collapse: collapse; table-layout: fixed; border: 1.5px solid #000; }
        th, td { border: 1px solid #000; padding: 1px !important; text-align: center; font-size: 8.5px; height: 14px; overflow: hidden; word-wrap: break-word; }
        
        /* Estilização Identica ao Modelo */
        th { background-color: var(--verde-ifro) !important; color: white !important; font-size: 9px; }
        
        .coluna-dia { 
            writing-mode: vertical-rl; 
            transform: rotate(180deg); 
            background: #e9ecef !important; 
            font-weight: bold; 
            width: 22px !important;
            text-transform: uppercase;
        }

        .horario-cell { width: 65px !important; font-weight: bold; background: #fff; }
        
        .intervalo { background-color: #fce4ec !important; font-weight: bold; color: #880e4f; font-size: 8px; }

        /* Filtro de Busca */
        .destaque { background-color: #ffff00 !important; font-weight: bold; color: #000 !important; box-shadow: inset 0 0 4px #000; }
        .opaco { opacity: 0.15; filter: grayscale(1); }

        @media print { .no-print { display: none; } }
    </style>
</head>
<body>

<div class="no-print">
    <select id="semana" onchange="carregarDados()">
        <option value="">Selecione a Semana</option>
        <option value="1579045633">09.02 a 13.02</option>
        <option value="491689833">16.02 a 20.02</option>
    </select>
    <input type="text" id="busca" placeholder="Professor ou Disciplina..." oninput="filtrar()">
    <button onclick="gerarPDF()">Exportar para PDF A4</button>
</div>

<div id="tituloDinamico" class="header-tabela"></div>
<table id="tabelaHorario"></table>

<script>
    const SPREADSHEET_ID = "1j33kiPqwtzZNuvkBgYDaIiXZvVMY_J0qWAtRfYGdnD8";

    async function carregarDados() {
        const gid = document.getElementById('semana').value;
        if(!gid) return;
        const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv&gid=${gid}`;
        
        try {
            const res = await fetch(url);
            const csv = await res.text();
            const dados = csv.split('\n').map(r => r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/^"|"$/g, '').trim()));
            
            // Corte exato: Linha 5 a 88 (indices 4-87), Coluna A a U (indices 0-20)
            const subset = dados.slice(4, 88).map(r => r.slice(0, 21));
            renderizar(subset);
            document.getElementById('tituloDinamico').innerText = "CURSOS TÉCNICOS INTEGRADOS - SEMANA " + document.getElementById('semana').selectedOptions[0].text;
        } catch(e) { alert("Erro ao carregar dados."); }
    }

    function renderizar(dados) {
        const tabela = document.getElementById('tabelaHorario');
        tabela.innerHTML = "";
        
        dados.forEach((row, i) => {
            const tr = document.createElement('tr');
            row.forEach((cell, j) => {
                const el = document.createElement(i === 0 ? 'th' : 'td');
                el.innerText = cell;
                
                // Aplicar Escrita Vertical e Classes Específicas
                if ([0, 5, 13].includes(j)) el.className = 'coluna-dia';
                if ([1, 6, 14].includes(j)) el.className = 'horario-cell';
                if (cell.toUpperCase().includes("INTERVALO")) el.className = 'intervalo';

                tr.appendChild(el);
            });
            tabela.appendChild(tr);
        });
        aplicarMesclagem([0, 5, 13]); // Mesclar Colunas de Dias
    }

    function aplicarMesclagem(colunas) {
        const tabela = document.getElementById('tabelaHorario');
        colunas.forEach(colIdx => {
            let celulaAlvo = null;
            for (let i = 1; i < tabela.rows.length; i++) {
                let celulaAtual = tabela.rows[i].cells[colIdx];
                if (celulaAlvo && celulaAtual && celulaAtual.innerText === celulaAlvo.innerText && celulaAtual.innerText !== "") {
                    celulaAtual.style.display = "none";
                    celulaAlvo.rowSpan = (celulaAlvo.rowSpan || 1) + 1;
                } else {
                    celulaAlvo = celulaAtual;
                }
            }
        });
    }

    function filtrar() {
        const busca = document.getElementById('busca').value.toLowerCase();
        document.querySelectorAll('#tabelaHorario td').forEach(td => {
            if(busca && td.innerText.toLowerCase().includes(busca)) {
                td.classList.add('destaque'); td.classList.remove('opaco');
            } else if(busca) {
                td.classList.add('opaco'); td.classList.remove('destaque');
            } else {
                td.classList.remove('opaco', 'destaque');
            }
        });
    }

    function gerarPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({ orientation: 'l', unit: 'mm', format: 'a4' });
        
        doc.autoTable({
            html: '#tabelaHorario',
            styles: { fontSize: 5.2, cellPadding: 0.3, lineColor: 0, lineWidth: 0.05, halign: 'center', valign: 'middle' },
            headStyles: { fillColor: [50, 160, 65], textColor: 255 },
            margin: { top: 8, left: 3, right: 3 },
            columnStyles: { 
                0: { cellWidth: 7 }, 5: { cellWidth: 7 }, 13: { cellWidth: 7 }, // Dias mais finos
                1: { cellWidth: 15 }, 6: { cellWidth: 15 }, 14: { cellWidth: 15 } // Horários
            },
            didParseCell: function(data) {
                if (data.cell.text[0].includes("INTERVALO")) data.cell.styles.fillColor = [252, 228, 236];
            }
        });
        doc.save("HORARIO_INTEGRADO_IFRO.pdf");
    }
</script>
</body>
</html>
