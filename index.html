<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Grade Semanal - IFRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Estilos específicos para a Grade Matricial */
        .table-grade {
            table-layout: fixed;
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
        }

        /* Fixar o nome do Dia */
        .dia-header-sticky {
            position: sticky;
            top: 0;
            z-index: 30;
        }

        /* Fixar o cabeçalho das turmas (abaixo do dia) */
        .turmas-header-sticky {
            position: sticky;
            top: 48px; /* Ajuste conforme a altura do .dia-header-sticky */
            z-index: 20;
            background-color: #f9fafb;
            box-shadow: 0 2px 2px -1px rgba(0, 0, 0, 0.1);
        }

        .aula-card {
            transition: transform 0.1s ease;
        }

        .aula-card:hover {
            transform: scale(1.02);
        }

        /* Estilização da barra de rolagem para grades largas */
        .overflow-x-auto::-webkit-scrollbar {
            height: 8px;
        }
        .overflow-x-auto::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4">

    <div class="max-w-7xl mx-auto bg-white p-6 rounded-xl shadow-md mb-8">
        <h1 class="text-2xl font-bold text-green-800 mb-6 flex items-center gap-2">
            📅 Gerador de Horários Semanais
        </h1>
        
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Semana</label>
                <input type="week" id="weekInputGeral" onchange="gerarGradeSemanal()" 
                       class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-green-500 focus:ring-green-500 p-2 border">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700">Nível</label>
                <select id="nivelSelect" onchange="gerarGradeSemanal()" 
                        class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-green-500 focus:ring-green-500 p-2 border">
                    <option value="tecnico">Técnico Integrado</option>
                    <option value="superior">Ensino Superior</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Filtrar Professor</label>
                <input type="text" id="buscaGeral" oninput="gerarGradeSemanal()" placeholder="Nome do docente..."
                       class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-green-500 focus:ring-green-500 p-2 border">
            </div>

            <div class="flex items-end">
                <button onclick="window.print()" class="bg-gray-800 text-white px-4 py-2 rounded-md hover:bg-gray-700 transition w-full">
                    Print / PDF
                </button>
            </div>
        </div>
    </div>

    <div id="gradeGeralRender" class="max-w-[100vw] overflow-x-hidden">
        <div class="text-center py-20 text-gray-400">
            <p>Selecione uma semana para visualizar a grade.</p>
        </div>
    </div>

    <script>
        // MOCK DE DADOS (Para teste, substitua pelo seu dataStore real)
        // const dataStore = { ... }; 
        // const GABARITO = [ ... ];

        /**
         * Função principal de geração da grade
         */
        function gerarGradeSemanal() {
            const weekInput = document.getElementById("weekInputGeral");
            const nivelInput = document.getElementById("nivelSelect");
            const buscaInput = document.getElementById("buscaGeral");
            const render = document.getElementById("gradeGeralRender");

            if (!weekInput.value) return;

            // Lógica de Datas
            const [ano, semana] = weekInput.value.split("-W").map(Number);
            const start = getStartOfWeek(semana, ano);
            const nivel = nivelInput.value;
            const buscaProf = (buscaInput.value || "").toLowerCase();

            // Filtragem
            const horarios = nivel === "tecnico" 
                ? GABARITO.filter(s => s.h.split(" - ")[0] < "18:20") 
                : GABARITO;

            const turmas = Object.keys(dataStore).filter(id => {
                const ehSup = typeof turmaEhSuperior === "function" ? turmaEhSuperior(id) : false;
                return nivel === "superior" ? ehSup : !ehSup;
            }).sort();

            let html = "";
            const diasLabel = ["SEGUNDA", "TERÇA", "QUARTA", "QUINTA", "SEXTA", "SÁBADO"];

            for (let i = 0; i < 6; i++) {
                const dataDia = new Date(start);
                dataDia.setDate(start.getDate() + i);
                dataDia.setHours(0,0,0,0);

                html += `
                <div class="mb-10 bg-white rounded-lg shadow-sm overflow-hidden border border-gray-200">
                    <div class="dia-header-sticky bg-green-700 text-white p-3 font-bold flex justify-between items-center shadow-md">
                        <span>${diasLabel[i]}</span>
                        <span class="text-green-100 text-sm">${dataDia.toLocaleDateString("pt-BR")}</span>
                    </div>
                    
                    <div class="overflow-x-auto">
                        <table class="table-grade">
                            <thead>
                                <tr class="turmas-header-sticky">
                                    <th class="p-2 border-b border-r w-20 text-[10px] text-gray-400 bg-gray-50">HORA</th>
                                    ${turmas.map(tId => `<th class="p-2 border-b border-r text-sm text-gray-700 min-w-[150px] font-bold text-center">${dataStore[tId].name}</th>`).join("")}
                                </tr>
                            </thead>
                            <tbody>
                                ${renderizarLinhas(horarios, turmas, dataDia, buscaProf)}
                            </tbody>
                        </table>
                    </div>
                </div>`;
            }

            render.innerHTML = html;
        }

        function renderizarLinhas(horarios, turmas, dataDia, busca) {
            return horarios.map(slot => {
                if (slot.t === "intervalo") {
                    return `
                    <tr class="bg-gray-50">
                        <td class="p-1 border-b border-r text-center text-[9px] text-gray-400">${slot.h}</td>
                        <td colspan="${turmas.length}" class="p-1 border-b text-center text-[10px] uppercase tracking-tighter text-gray-400 italic">
                            ${slot.l || "Intervalo"}
                        </td>
                    </tr>`;
                }

                const horaSlot = slot.h.split(" - ")[0].substring(0, 5).padStart(5, "0");

                return `
                <tr>
                    <td class="p-2 border-b border-r bg-gray-50 font-mono text-[10px] font-bold text-center text-gray-600">${slot.h}</td>
                    ${turmas.map(tId => {
                        let aulas = "";
                        const discs = dataStore[tId].discs || {};

                        Object.values(discs).forEach(d => {
                            (d.sch || []).forEach(a => {
                                const dtAula = new Date(a.dtObj);
                                dtAula.setHours(0,0,0,0);
                                const hAula = (a.time || "").split(" - ")[0].substring(0,5).padStart(5,"0");

                                if (dtAula.getTime() === dataDia.getTime() && hAula === horaSlot) {
                                    const prof = a.prof || "";
                                    if (!busca || prof.toLowerCase().includes(busca)) {
                                        aulas += `
                                        <div class="aula-card border-l-4 border-green-600 p-2 mb-1 bg-green-50 rounded shadow-sm">
                                            <div class="font-bold text-[10px] leading-tight text-gray-800">${d.name}</div>
                                            <div class="text-[9px] text-blue-700 mt-1">${prof}</div>
                                        </div>`;
                                    }
                                }
                            });
                        });
                        return `<td class="p-1 border-b border-r align-top min-h-[60px]">${aulas}</td>`;
                    }).join("")}
                </tr>`;
            }).join("");
        }

        // Funções Auxiliares Necessárias
        function getStartOfWeek(w, y) {
            const d = (1 + (w - 1) * 7);
            return new Date(y, 0, d);
        }

        function turmaEhSuperior(tId) {
            // Lógica simples: se começa com 1, 2 ou 3 costuma ser integrado. 
            // Ajuste conforme seu padrão de IDs.
            return tId.toLowerCase().includes("ads") || tId.toLowerCase().includes("pos"); 
        }
    </script>
</body>
</html>
