<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade IFRO - Matriz Total com Filtro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-size: 9px; font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        
        /* Tabela flexível para suportar 15+ colunas */
        .table-grade { width: auto; min-width: 100%; border-collapse: collapse; }
        
        /* Cabeçalhos fixos (Sticky) */
        .dia-header { position: sticky; top: 0; z-index: 50; background: #166534; color: white; padding: 6px; font-weight: bold; text-align: center; font-size: 10px; }
        .turmas-header { position: sticky; top: 25px; z-index: 40; background: #f3f4f6; box-shadow: 0 2px 2px -1px rgba(0,0,0,0.1); }
        
        /* Células da Matriz */
        td { border: 1px solid #e5e7eb; vertical-align: top; height: 40px; padding: 2px; min-width: 90px; }
        th { border: 1px solid #e5e7eb; font-size: 8px; padding: 4px; background: #f9fafb; text-transform: uppercase; min-width: 90px; }
        
        /* Coluna de Horário Fixa à Esquerda */
        .col-horario { 
            width: 60px; 
            min-width: 60px;
            background: #f8fafc; 
            text-align: center; 
            font-weight: bold; 
            font-size: 8px; 
            color: #475569;
            position: sticky;
            left: 0;
            z-index: 35;
            border-right: 2px solid #cbd5e1;
        }

        /* Card de Aula */
        .aula-card { 
            border-left: 3px solid #166534;
            padding: 2px 4px;
            background-color: #f0fdf4;
            line-height: 1.2;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border-radius: 2px;
        }
        .disc-label { font-weight: 800; color: #14532d; font-size: 7.5px; display: block; overflow: hidden; text-overflow: ellipsis; }
        .prof-label { color: #1d4ed8; font-size: 7px; display: block; font-weight: 600; margin-top: 1px; }
        
        .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.9); display: none; justify-content: center; align-items: center; z-index: 100; flex-direction: column; }
        
        /* Scrollbar suave */
        .overflow-x-auto::-webkit-scrollbar { height: 8px; }
        .overflow-x-auto::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .overflow-x-auto::-webkit-scrollbar-track { background: #f1f5f9; }
    </style>
</head>
<body class="p-2">

    <div id="loading" class="loading-overlay">
        <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-green-700 mb-2"></div>
        <span class="text-green-800 font-bold text-[10px] tracking-widest uppercase">Sincronizando Matriz...</span>
    </div>

    <div class="max-w-full mx-auto bg-white p-4 rounded shadow-sm mb-4 border border-gray-200">
        <div class="flex flex-wrap justify-between items-end gap-4">
            <div class="flex flex-wrap gap-4 items-end">
                <div>
                    <label class="block text-[9px] font-bold text-gray-400 uppercase mb-1">Escolha a Semana</label>
                    <input type="week" id="weekInput" onchange="renderizar()" class="border border-gray-300 rounded p-2 text-[10px] outline-none focus:border-green-600">
                </div>
                <div>
                    <label class="block text-[9px] font-bold text-gray-400 uppercase mb-1">Nível de Ensino</label>
                    <select id="nivelSelect" onchange="renderizar()" class="border border-gray-300 rounded p-2 text-[10px] outline-none">
                        <option value="tecnico">Técnico Integrado</option>
                        <option value="superior">Superior / Noturno</option>
                    </select>
                </div>
                <div class="w-64">
                    <label class="block text-[9px] font-bold text-gray-400 uppercase mb-1">Filtrar/Destacar Professor</label>
                    <input type="text" id="buscaProf" oninput="renderizar()" placeholder="Ex: Sergio, Heloisa..." class="w-full border border-gray-300 rounded p-2 text-[10px] outline-none focus:ring-1 focus:ring-green-500">
                </div>
            </div>
            <button onclick="fetchData()" class="bg-green-700 text-white px-5 py-2 rounded text-[10px] font-bold hover:bg-green-800 transition uppercase shadow-sm">
                🔄 Atualizar Planilha
            </button>
        </div>
    </div>

    <div id="gradeContainer" class="space-y-10 pb-10">
        </div>

    <script>
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/1j33kiPqwtzZNuvkBgYDaIiXZvVMY_J0qWAtRfYGdnD8/export?format=csv&gid=1589791808';
        let matrizDados = {};

        const GABARITO = [
            { start: "07:30", label: "07:30-08:20" }, { start: "08:20", label: "08:20-09:10" },
            { start: "09:10", label: "INTERVALO", isBreak: true },
            { start: "09:30", label: "09:30-10:20" }, { start: "10:20", label: "10:20-11:10" }, { start: "11:10", label: "11:10-12:00" },
            { start: "12:00", label: "ALMOÇO", isBreak: true },
            { start: "13:50", label: "13:50-14:40" }, { start: "14:40", label: "14:40-15:30" },
            { start: "15:30", label: "INTERVALO", isBreak: true },
            { start: "15:50", label: "15:50-16:40" }, { start: "16:40", label: "16:40-17:30" }, { start: "17:30", label: "17:30-18:20" },
            { start: "18:20", label: "JANTAR", isBreak: true },
            { start: "19:00", label: "19:00-19:50" }, { start: "19:50", label: "19:50-20:40" },
            { start: "20:40", label: "INTERVALO", isBreak: true },
            { start: "20:50", label: "20:50-21:40" }, { start: "21:40", label: "21:40-22:30" }
        ];

        async function fetchData() {
            document.getElementById('loading').style.display = 'flex';
            try {
                const res = await fetch(SHEET_URL);
                const csv = await res.text();
                const lines = csv.split('\n').map(line => line.split(','));
                
                matrizDados = {};
                lines.slice(100).forEach(l => {
                    if (!l[0] || !l[2]) return;
                    const dateKey = formatarData(l[0]);
                    const hora = l[1].trim().substring(0, 5);
                    const turma = l[2].trim().replace(/"/g, '');
                    const disc = l[3].replace(/"/g, '').trim();
                    const prof = (l[4] || "A Definir").replace(/"/g, '').trim();

                    if (!matrizDados[dateKey]) matrizDados[dateKey] = {};
                    if (!matrizDados[dateKey][turma]) matrizDados[dateKey][turma] = {};
                    matrizDados[dateKey][turma][hora] = { disc, prof };
                });
                renderizar();
            } catch (e) { alert("Falha ao sincronizar."); }
            finally { document.getElementById('loading').style.display = 'none'; }
        }

        function formatarData(str) {
            const p = str.includes('/') ? str.split('/') : str.split('-');
            if(p.length < 3) return "";
            const d = p[0].trim().padStart(2, '0'), m = p[1].trim().padStart(2, '0');
            let a = p[2].trim(); if(a.length === 2) a = "20" + a;
            return `${a}-${m}-${d}`;
        }

        function renderizar() {
            const weekVal = document.getElementById("weekInput").value;
            if (!weekVal) return;
            const [ano, sem] = weekVal.split("-W").map(Number);
            const segunda = getMonday(sem, ano);
            const nivel = document.getElementById("nivelSelect").value;
            const busca = document.getElementById("buscaProf").value.toLowerCase();

            let todasTurmas = new Set();
            Object.values(matrizDados).forEach(dia => Object.keys(dia).forEach(t => todasTurmas.add(t)));
            
            const turmasFiltradas = [...todasTurmas].filter(t => {
                const ehSup = /ads|pos|super|gestao|pedag/i.test(t);
                return nivel === "superior" ? ehSup : !ehSup;
            }).sort();

            let html = "";
            const diasTxt = ["SEGUNDA", "TERÇA", "QUARTA", "QUINTA", "SEXTA", "SÁBADO"];

            for (let i = 0; i < 6; i++) {
                const diaAtual = new Date(segunda);
                diaAtual.setDate(segunda.getDate() + i);
                const dataRef = diaAtual.toISOString().split('T')[0];

                html += `
                <div class="bg-white rounded shadow-lg border border-gray-200 overflow-hidden">
                    <div class="dia-header uppercase">${diasTxt[i]} — ${diaAtual.toLocaleDateString('pt-BR')}</div>
                    <div class="overflow-x-auto">
                        <table class="table-grade">
                            <thead>
                                <tr class="turmas-header">
                                    <th class="col-horario">HORÁRIO</th>
                                    ${turmasFiltradas.map(t => `<th>${t}</th>`).join("")}
                                </tr>
                            </thead>
                            <tbody>
                                ${gerarLinhas(turmasFiltradas, dataRef, busca, nivel)}
                            </tbody>
                        </table>
                    </div>
                </div>`;
            }
            document.getElementById("gradeContainer").innerHTML = html;
        }

        function gerarLinhas(turmas, dataRef, busca, nivel) {
            const slots = nivel === "tecnico" ? GABARITO.filter(s => s.start < "18:20") : GABARITO;
            return slots.map(slot => {
                if (slot.isBreak) {
                    return `<tr class="bg-gray-50"><td class="col-horario">${slot.start}</td><td colspan="${turmas.length}" class="text-center font-bold text-gray-300 text-[7px] py-1 tracking-[0.3em] uppercase">${slot.label}</td></tr>`;
                }
                return `<tr>
                    <td class="col-horario">${slot.label}</td>
                    ${turmas.map(t => {
                        const aula = matrizDados[dataRef]?.[t]?.[slot.start];
                        let content = "";
                        if (aula) {
                            // Se houver busca, só exibe se o nome do professor bater
                            if (!busca || aula.prof.toLowerCase().includes(busca)) {
                                content = `
                                <div class="aula-card">
                                    <span class="disc-label">${aula.disc}</span>
                                    <span class="prof-label">${aula.prof}</span>
                                </div>`;
                            }
                        }
                        return `<td>${content}</td>`;
                    }).join("")}
                </tr>`;
            }).join("");
        }

        function getMonday(w, y) {
            const simple = new Date(y, 0, 1 + (w - 1) * 7);
            const dow = simple.getDay();
            const ISOweekStart = simple;
            if (dow <= 4) ISOweekStart.setDate(simple.getDate() - simple.getDay() + 1);
            else ISOweekStart.setDate(simple.getDate() + 8 - simple.getDay());
            return ISOweekStart;
        }
    </script>
</body>
</html>
