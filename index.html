<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matriz de Horários IFRO - Versão Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-size: 9px; font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        
        /* Força a tabela a não quebrar e a expandir horizontalmente */
        .table-grade { table-layout: auto !important; width: max-content !important; min-width: 100%; border-collapse: collapse; }
        
        .dia-header { position: sticky; top: 0; z-index: 50; background: #15803d; color: white; padding: 8px; font-weight: bold; text-align: center; font-size: 11px; }
        .turmas-header { position: sticky; top: 31px; z-index: 40; background: #f8fafc; border-bottom: 2px solid #cbd5e1; }
        
        /* Células com largura mínima garantida para as 15+ colunas */
        td { border: 1px solid #e2e8f0; vertical-align: top; height: 42px; padding: 2px; min-width: 100px; max-width: 150px; }
        th { border: 1px solid #e2e8f0; font-size: 8.5px; padding: 6px; background: #f8fafc; text-transform: uppercase; min-width: 100px; }
        
        .col-horario { 
            width: 70px; min-width: 70px !important; background: #f1f5f9; 
            text-align: center; font-weight: bold; font-size: 8.5px; color: #334155;
            position: sticky; left: 0; z-index: 45; border-right: 3px solid #cbd5e1 !important;
        }

        .aula-card { 
            border-left: 3px solid #15803d; padding: 3px; background-color: #f0fdf4;
            line-height: 1.2; border-radius: 3px; box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .disc-label { font-weight: 800; color: #166534; font-size: 8px; display: block; word-break: break-word; }
        .prof-label { color: #2563eb; font-size: 7.5px; display: block; font-weight: 600; margin-top: 2px; }
        
        /* Container de rolagem */
        .scroll-container { overflow-x: auto; width: 100%; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .scroll-container::-webkit-scrollbar { height: 10px; }
        .scroll-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 5px; }

        .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.9); display: none; justify-content: center; align-items: center; z-index: 100; flex-direction: column; }
    </style>
</head>
<body class="p-3">

    <div id="loading" class="loading-overlay">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-green-700 mb-3"></div>
        <span class="text-green-800 font-black uppercase tracking-widest">Sincronizando Matriz Completa...</span>
    </div>

    <div class="max-w-full mx-auto bg-white p-5 rounded-xl shadow-sm mb-6 border border-gray-200">
        <div class="flex flex-wrap justify-between items-end gap-5">
            <div class="flex flex-wrap gap-5 items-end">
                <div>
                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Semana de Referência</label>
                    <input type="week" id="weekInput" onchange="renderizar()" class="border border-gray-300 rounded-lg p-2 text-[11px] outline-none focus:ring-2 focus:ring-green-500">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Filtrar por Nível</label>
                    <select id="nivelSelect" onchange="renderizar()" class="border border-gray-300 rounded-lg p-2 text-[11px] outline-none">
                        <option value="tecnico">Técnico Integrado</option>
                        <option value="superior">Superior / Noturno</option>
                    </select>
                </div>
                <div class="w-72">
                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Destaque de Professor</label>
                    <input type="text" id="buscaProf" oninput="renderizar()" placeholder="Digite o nome para filtrar..." class="w-full border border-gray-300 rounded-lg p-2 text-[11px] outline-none focus:ring-2 focus:ring-green-500">
                </div>
            </div>
            <button onclick="fetchData()" class="bg-green-700 text-white px-8 py-2.5 rounded-lg text-[11px] font-black hover:bg-green-800 transition-all shadow-md uppercase tracking-wider">
                Sincronizar Planilha
            </button>
        </div>
    </div>

    <div id="gradeContainer" class="space-y-12 pb-10">
        </div>

    <script>
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/1j33kiPqwtzZNuvkBgYDaIiXZvVMY_J0qWAtRfYGdnD8/export?format=csv&gid=1589791808';
        let matrizDados = {};

        const GABARITO = [
            { start: "07:30", label: "07:30 - 08:20" }, { start: "08:20", label: "08:20 - 09:10" },
            { start: "09:10", label: "INTERVALO", brk: true },
            { start: "09:30", label: "09:30 - 10:20" }, { start: "10:20", label: "10:20 - 11:10" }, { start: "11:10", label: "11:10 - 12:00" },
            { start: "12:00", label: "ALMOÇO", brk: true },
            { start: "13:50", label: "13:50 - 14:40" }, { start: "14:40", label: "14:40 - 15:30" },
            { start: "15:30", label: "INTERVALO", brk: true },
            { start: "15:50", label: "15:50 - 16:40" }, { start: "16:40", label: "16:40 - 17:30" }, { start: "17:30", label: "17:30 - 18:20" },
            { start: "18:20", label: "JANTAR", brk: true },
            { start: "19:00", label: "19:00 - 19:50" }, { start: "19:50", label: "19:50 - 20:40" },
            { start: "20:40", label: "INTERVALO", brk: true },
            { start: "20:50", label: "20:50 - 21:40" }, { start: "21:40", label: "21:40 - 22:30" }
        ];

        async function fetchData() {
            document.getElementById('loading').style.display = 'flex';
            try {
                const res = await fetch(SHEET_URL);
                const csv = await res.text();
                const lines = csv.split('\n').map(line => line.split(','));
                
                matrizDados = {};
                // Ignora qualquer cabeçalho e lê direto os dados
                lines.slice(100).forEach(l => {
                    if (!l[0] || !l[2]) return;
                    const dk = formatarData(l[0]);
                    const hr = l[1].trim().substring(0, 5);
                    const tm = l[2].trim().replace(/"/g, '');
                    const ds = l[3].replace(/"/g, '').trim();
                    const pf = (l[4] || "A Definir").replace(/"/g, '').trim();

                    if (!matrizDados[dk]) matrizDados[dk] = {};
                    if (!matrizDados[dk][tm]) matrizDados[dk][tm] = {};
                    matrizDados[dk][tm][hr] = { ds, pf };
                });
                renderizar();
            } catch (e) { alert("Erro na sincronização."); }
            finally { document.getElementById('loading').style.display = 'none'; }
        }

        function formatarData(str) {
            const p = str.includes('/') ? str.split('/') : str.split('-');
            const d = p[0].trim().padStart(2, '0'), m = p[1].trim().padStart(2, '0');
            let a = p[2].trim(); if(a.length === 2) a = "20" + a;
            return `${a}-${m}-${d}`;
        }

        function renderizar() {
            const val = document.getElementById("weekInput").value;
            if (!val) return;
            const [ano, sem] = val.split("-W").map(Number);
            const seg = getMonday(sem, ano);
            const niv = document.getElementById("nivelSelect").value;
            const bus = document.getElementById("buscaProf").value.toLowerCase();

            let tP = new Set();
            Object.values(matrizDados).forEach(dia => Object.keys(dia).forEach(t => tP.add(t)));
            const tF = [...tP].filter(t => niv === "superior" ? /ads|pos|super|gestao|pedag/i.test(t) : !/ads|pos|super|gestao|pedag/i.test(t)).sort();

            let h = "";
            const dd = ["SEGUNDA-FEIRA", "TERÇA-FEIRA", "QUARTA-FEIRA", "QUINTA-FEIRA", "SEXTA-FEIRA", "SÁBADO"];

            for (let i = 0; i < 6; i++) {
                const dt = new Date(seg); dt.setDate(seg.getDate() + i);
                const ref = dt.toISOString().split('T')[0];

                h += `
                <div class="bg-white rounded-xl shadow-lg overflow-hidden border border-gray-200">
                    <div class="dia-header uppercase">${dd[i]} — ${dt.toLocaleDateString('pt-BR')}</div>
                    <div class="scroll-container">
                        <table class="table-grade">
                            <thead>
                                <tr class="turmas-header">
                                    <th class="col-horario">HORÁRIO</th>
                                    ${tF.map(t => `<th>${t}</th>`).join("")}
                                </tr>
                            </thead>
                            <tbody>
                                ${gerarLinhas(tF, ref, bus, niv)}
                            </tbody>
                        </table>
                    </div>
                </div>`;
            }
            document.getElementById("gradeContainer").innerHTML = h;
        }

        function gerarLinhas(turmas, ref, bus, niv) {
            const slots = niv === "tecnico" ? GABARITO.filter(s => s.start < "18:20") : GABARITO;
            return slots.map(s => {
                if (s.brk) return `<tr class="bg-gray-50"><td class="col-horario">${s.start}</td><td colspan="${turmas.length}" class="text-center font-bold text-gray-300 text-[7px] tracking-[0.4em] uppercase">${s.label}</td></tr>`;
                return `<tr>
                    <td class="col-horario">${s.label}</td>
                    ${turmas.map(t => {
                        const a = matrizDados[ref]?.[t]?.[s.start];
                        let c = "";
                        if (a && (!bus || a.pf.toLowerCase().includes(bus))) {
                            c = `<div class="aula-card"><span class="disc-label">${a.ds}</span><span class="prof-label">${a.pf}</span></div>`;
                        }
                        return `<td>${c}</td>`;
                    }).join("")}
                </tr>`;
            }).join("");
        }

        function getMonday(w, y) {
            const s = new Date(y, 0, 1 + (w - 1) * 7);
            const d = s.getDay();
            if (d <= 4) s.setDate(s.getDate() - s.getDay() + 1);
            else s.setDate(s.getDate() + 8 - s.getDay());
            return s;
        }
    </script>
</body>
</html>
