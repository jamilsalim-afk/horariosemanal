<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Horários IFRO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
:root { --primary:#2e7d32; --bg:#f4f7f6; }

body { margin:0; font-family:Segoe UI; background:var(--bg); }

/* HEADER FIXO */
.ifro-header {
    position:sticky;
    top:0;
    z-index:1000;
    background:white;
    border-bottom:4px solid var(--primary);
}

.header-content { text-align:center; padding:8px; }

.tabs {
    display:flex;
    justify-content:center;
    gap:10px;
    padding:10px;
}

.tab-btn {
    padding:12px 20px;
    font-size:16px;
    border:1px solid #ccc;
    cursor:pointer;
    background:white;
    border-radius:6px;
}

.tab-btn.active {
    border:2px solid var(--primary);
    font-weight:bold;
}

/* CONTROLES FIXOS */
.controls {
    position:sticky;
    top:120px;
    z-index:999;
    background:var(--bg);
    padding:10px;
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
}

select, input, button {
    padding:10px;
    font-size:16px;
}

/* TABELA */
.container { padding:10px; }

table {
    width:100%;
    border-collapse:collapse;
    margin:15px 0;
    background:white;
    table-layout:fixed;
}

th, td {
    border:1px solid #bbb;
    padding:4px;
    font-size:11px;
    text-align:center;
    word-break:break-word;
}

.day-divider {
    background:var(--primary);
    color:white;
    font-weight:bold;
}

.time-col {
    background:#eee;
    width:70px;
    font-weight:bold;
}

/* FOOTER */
footer {
    background:#2e7d32;
    color:white;
    text-align:center;
    padding:20px;
}
</style>
</head>

<body>

<div class="ifro-header">
    <div class="header-content">
        <b style="color:#2e7d32">IFRO - Campus Cacoal</b><br>
        Horários 2026
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="trocarAba('INTEGRADO',this)">INTEGRADO</button>
        <button class="tab-btn" onclick="trocarAba('SUPERIOR',this)">SUPERIOR</button>
    </div>
</div>

<div class="controls">
    <select id="semana"></select>
    <input id="busca" placeholder="Buscar professor">
    <button onclick="exportarPDF()">PDF</button>
</div>

<div class="container" id="tabela"></div>

<footer>
IFRO - Campus Cacoal<br>
BR 364 Km 228 | ☎ (69) 3443-2445
</footer>

<script>
const SHEETS={
INTEGRADO:{id:'1j33kiPqwtzZNuvkBgYDaIiXZvVMY_J0qWAtRfYGdnD8',gid:'1357770092'},
SUPERIOR:{id:'14ALXZgFIT68ee9ajuIdG63SpGVm0HyTjwp63-J6vRyg',gid:'669887707'}
};

let modo='INTEGRADO';
let dados=[],turmas=[],semanas={};

function parseCSV(t){
    let l=[],r=[],c='',q=false;
    for(let ch of t){
        if(ch=='"') q=!q;
        else if(ch==','&&!q){r.push(c);c=''}
        else if(ch=='\n'&&!q){r.push(c);l.push(r);r=[];c=''}
        else c+=ch;
    }
    if(c) r.push(c);
    if(r.length) l.push(r);
    return l;
}

function trocarAba(m,btn){
    modo=m;
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    carregar();
}

async function carregar(){
    const url=`https://docs.google.com/spreadsheets/d/${SHEETS[modo].id}/export?format=csv&gid=${SHEETS[modo].gid}`;
    const txt=await (await fetch(url)).text();

    dados=parseCSV(txt);
    turmas=dados[0].slice(2);

    processar();
}

function processar(){
    semanas={};
    let ultima="";

    dados.slice(1).forEach(r=>{
        if(r[0]) ultima=r[0];
        r[0]=ultima;
        if(!r[0]) return;

        const [d,m,a]=r[0].split('/');
        const dt=new Date(a,m-1,d);

        const seg=new Date(dt.setDate(dt.getDate()-dt.getDay()+1));
        const key=seg.toLocaleDateString('pt-BR');

        if(!semanas[key]) semanas[key]=[];
        semanas[key].push(r);
    });

    const sel=document.getElementById('semana');
    sel.innerHTML="";
    Object.keys(semanas).forEach(s=>sel.innerHTML+=`<option>${s}</option>`);
    sel.onchange=render;

    render();
}

function render(){
    const sem=document.getElementById('semana').value;
    const linhas=semanas[sem];

    // 🔥 FILTRO REAL DO SUPERIOR
    let tAtivas = turmas.filter((t,i)=>{
        return linhas.some(r=>{
            let v=(r[i+2]||"").trim();
            return v && v!=="-" && v!==""; // 🔥 robusto
        });
    });

    if(modo==='INTEGRADO') tAtivas=turmas;

    const dias=["SEGUNDA-FEIRA","TERÇA-FEIRA","QUARTA-FEIRA","QUINTA-FEIRA","SEXTA-FEIRA","SÁBADO"];
    const nomes=["DOM","SEGUNDA-FEIRA","TERÇA-FEIRA","QUARTA-FEIRA","QUINTA-FEIRA","SEXTA-FEIRA","SÁBADO"];

    let grupos={};

    linhas.forEach(r=>{
        const [d,m,a]=r[0].split('/');
        const dt=new Date(a,m-1,d);
        const nome=nomes[dt.getDay()];
        if(dt.getDay()==0) return;

        if(!grupos[nome]) grupos[nome]={data:r[0],linhas:[]};
        grupos[nome].linhas.push(r);
    });

    let html="";

    dias.forEach(d=>{
        if(!grupos[d]) return;

        html+=`<table>`;
        html+=`<tr class="day-divider"><td colspan="${tAtivas.length+1}">${d} - ${grupos[d].data}</td></tr>`;

        html+=`<tr><th class="time-col">Horário</th>`;
        tAtivas.forEach(t=>html+=`<th>${t}</th>`);
        html+=`</tr>`;

        grupos[d].linhas.forEach(r=>{
            html+=`<tr>`;
            html+=`<td class="time-col">${r[1]}</td>`;
            tAtivas.forEach(t=>{
                const idx=dados[0].indexOf(t);
                html+=`<td>${r[idx]||""}</td>`;
            });
            html+=`</tr>`;
        });

        html+=`</table>`;
    });

    document.getElementById('tabela').innerHTML=html;
}

/* PDF FUNCIONAL */
function exportarPDF(){
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF('l');

    const tables = document.querySelectorAll("table");

    tables.forEach((t,i)=>{
        if(i>0) pdf.addPage();
        pdf.text(t.rows[0].innerText,10,10);

        let y=20;
        [...t.rows].slice(1).forEach(r=>{
            pdf.text(r.innerText.substring(0,120),10,y);
            y+=5;
        });
    });

    pdf.save("horario.pdf");
}

window.onload=carregar;
</script>

</body>
</html>
