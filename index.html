<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Horários - IFRO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --ifro-verde: #32a041; --ifro-dark: #1b5e20; --bg: #f4f4f4; }
        body { font-family: 'Arial Narrow', sans-serif; margin: 10px; background-color: var(--bg); }
        
        .no-print { background: white; padding: 15px; border-radius: 8px; margin-bottom: 15px; display: flex; gap: 10px; flex-wrap: wrap; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        select, input, button { padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; }
        button { background: var(--ifro-verde); color: white; border: none; cursor: pointer; font-weight: bold; }

        .header-tabela { text-align: center; font-weight: bold; margin-bottom: 10px; font-size: 14px; color: var(--ifro-dark); }

        .table-container { background: white; padding: 5px; border-radius: 4px; overflow-x: auto; }
        
        table { width: 100%; border-collapse: collapse; table-layout: fixed; border: 1px solid #000; }
        th, td { border: 1px solid #000; padding: 2px 1px; text-align: center; font-size: 9px; word-wrap: break-word; overflow: hidden; }
        
        /* Cabeçalho Verde */
        th { background-color: var(--ifro-verde) !important; color: white !important; font-weight: bold; height: 30px; }
        
        /* Coluna de DIA Vertical */
        .coluna-dia { 
            writing-mode: vertical-rl; 
            transform: rotate(180deg); 
            white-space: nowrap; 
            width: 25px !important; 
            font-weight: bold;
            background-color: #e8f5e9;
        }

        /* Estilo para Intervalos */
        .linha-intervalo { background-color: #ffebee !important; font-weight: bold; color: #c62828; }

        /* Filtros de Destaque */
        .destaque { background-color: #ffeb3b !important; font-weight: bold; color: #000 !important; }
        .opaco { opacity: 0.2; }

        @media print { .no-print { display: none; } }
    </style>
</head>
<body>

<div class="no-print">
    <select id="nivel" onchange="popularSemanas()"><option value="">Nível</option><option value="Integrado">Integrado</option></select>
    <select id="semana" onchange="carregarDados()"><option value="">Semana</option></select>
    <input type="text" id="buscaProfessor" placeholder="Filtrar..." oninput="aplicarFiltro()">
    <button onclick="gerarPDF()">Gerar PDF A4</button>
</div>

<div id="tituloDinamico" class="header-tabela"></div>
<div class="table-container">
    <table id="tabelaHorario"></table>
</div>

<script>
    const SPREADSHEET_ID = "1j33kiPqwtzZNuvkBgYDaIiXZvVMY_J0qWAtRfYGdnD8";
    const cronograma = { "Integrado": [
        { nome: "16.02 a 20.02", gid: "491689833" },
        { nome: "27.04 a 02.05", gid: "0" }
    ]};

    function popularSemanas() {
        const nivel = document.getElementById('nivel').value;
        const s = document.getElementById('semana');
        s.innerHTML = '<option value="">Semana</option>';
        if(nivel) cronograma[nivel].forEach(i => s.add(new Option(i.nome, i.gid)));
    }

    async function carregarDados() {
        const gid = document.getElementById('semana').value;
        const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv&gid=${gid}`;
        const res = await fetch(url);
        const csv = await res.text();
        const dados = filtrarEProcessar(csv);
        renderizar(dados);
        document.getElementById('tituloDinamico').innerText = "HORÁRIO INTEGRADO - " + document.getElementById('semana').selectedOptions[0].text;
    }

    function filtrarEProcessar(csv) {
        const rows = csv.split('\n').map(r => r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/^"|"$/g, '').trim()));
        // Corte: Linha 5-88 (índice 4-87), Coluna A-U (índice 0-20)
        return rows.slice(4, 88).map(r => r.slice(0, 21));
    }

    function renderizar(dados) {
        const tabela = document.getElementById('tabelaHorario');
        tabela.innerHTML = "";
        
        dados.forEach((row, i) => {
            const tr = document.createElement('tr');
            row.forEach((cell, j) => {
                const el = document.createElement(i === 0 ? 'th' : 'td');
                el.innerText = cell;
                
                // Aplicar classe de escrita vertical na primeira coluna (DIA)
                if (j === 0 && i > 0) el.className = 'coluna-dia';
                
                // Detectar Intervalos para colorir
                if (cell.toUpperCase().includes("INTERVALO")) tr.className = 'linha-intervalo';

                tr.appendChild(el);
            });
            tabela.appendChild(tr);
        });

        mesclarCelulas();
    }

    function mesclarCelulas() {
        const tabela = document.getElementById('tabelaHorario');
        // Mesclar verticalmente a coluna DIA (0) e INTERVALOS
        [0].forEach(colIdx => {
            let lastCell = null;
            for (let i = 1; i < tabela.rows.length; i++) {
                let currentCell = tabela.rows[i].cells[colIdx];
                if (lastCell && currentCell && currentCell.innerText === lastCell.innerText && currentCell.innerText !== "") {
                    currentCell.style.display = "none";
                    lastCell.rowSpan = (lastCell.rowSpan || 1) + 1;
                } else {
                    lastCell = currentCell;
                }
            }
        });
    }

    function aplicarFiltro() {
        const termo = document.getElementById('buscaProfessor').value.toLowerCase();
        document.querySelectorAll('#tabelaHorario td').forEach(td => {
            if(termo && td.innerText.toLowerCase().includes(termo)) {
                td.classList.add('destaque'); td.classList.remove('opaco');
            } else if(termo) {
                td.classList.add('opaco'); td.classList.remove('destaque');
            } else {
                td.classList.remove('opaco', 'destaque');
            }
        });
    }

    function gerarPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({ orientation: 'l', unit: 'mm', format: 'a4' });
        
        doc.autoTable({
            html: '#tabelaHorario',
            styles: { fontSize: 5.5, cellPadding: 0.5, lineColor: [0, 0, 0], lineWidth: 0.1, halign: 'center' },
            headStyles: { fillColor: [50, 160, 65], textColor: 255 },
            columnStyles: { 0: { cellWidth: 8 } }, // Coluna do DIA mais estreita
            margin: { top: 10, left: 5, right: 5 },
            didParseCell: function(data) {
                if (data.cell.text[0].includes("INTERVALO")) {
                    data.cell.styles.fillColor = [255, 235, 238];
                }
            }
        });
        doc.save("horario_ifro.pdf");
    }
</script>
</body>
</html>
