<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Horários IFRO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
:root { --primary:#2e7d32; --bg:#f4f7f6; }

body { font-family:Segoe UI; background:var(--bg); margin:0; }

/* HEADER */
.ifro-header {
    position:sticky;
    top:0;
    z-index:1000;
    background:white;
    border-bottom:4px solid var(--primary);
}

/* CONTROLES FIXOS */
.controls-fixed {
    position:sticky;
    top:70px;
    z-index:999;
    background:var(--bg);
    padding:10px;
    display:flex;
    gap:10px;
    justify-content:center;
    flex-wrap:wrap;
}

/* BOTÕES GRANDES */
.tab-btn, select, input {
    padding:10px;
    font-size:16px;
    border-radius:6px;
}

/* TABELA */
table {
    width:100%;
    border-collapse:collapse;
    background:white;
    margin:15px 0;
    table-layout:fixed;
}

th, td {
    border:1px solid #bbb;
    padding:4px;
    font-size:11px; /* 🔥 menor */
    text-align:center;
    word-break:break-word;
}

.day-divider {
    background:var(--primary);
    color:white;
    font-weight:bold;
}

.time-col {
    background:#eee;
    font-weight:bold;
    width:70px;
}

.intervalo { background:#e0e0e0; font-weight:bold; }
.opaco { opacity:0.2; }

/* FOOTER */
.ifro-footer {
    background:#2e7d32;
    color:white;
    text-align:center;
    padding:20px;
    font-size:12px;
}
</style>
</head>

<body>

<div class="ifro-header">
    <div style="text-align:center;padding:10px">
        <b style="color:#2e7d32">IFRO - Campus Cacoal</b><br>
        Horários 2026
    </div>
</div>

<div class="tabs-header" style="display:flex;gap:5px;padding:10px;">
    <button class="tab-btn active" onclick="trocarAba('INTEGRADO',this)">INTEGRADO</button>
    <button class="tab-btn" onclick="trocarAba('SUPERIOR',this)">SUPERIOR</button>
</div>

<div class="controls-fixed">
    <select id="semana-INTEGRADO"></select>
    <select id="semana-SUPERIOR" style="display:none"></select>
    <input id="search" placeholder="Buscar professor">
    <button onclick="exportarPDF()">PDF</button>
</div>

<div id="tabela"></div>

<footer class="ifro-footer">
IFRO - Campus Cacoal<br>
BR 364 Km 228 | ☎ (69) 3443-2445
</footer>

<script>
const SHEETS={
INTEGRADO:{id:'1j33kiPqwtzZNuvkBgYDaIiXZvVMY_J0qWAtRfYGdnD8',gid:'1357770092'},
SUPERIOR:{id:'14ALXZgFIT68ee9ajuIdG63SpGVm0HyTjwp63-J6vRyg',gid:'669887707'}
};

let modalidade='INTEGRADO';
let dados=[],turmas=[],semanas={};

const CORES={
AGROEC:'#e8f5e9',AGROPEC:'#e3f2fd',INFO:'#fff8e1',
GEO:'#f3e5f5',MAT:'#e0f7fa',AGRONEG:'#efebe9',
ZOO:'#fce4ec',AGRON:'#f1f8e9'
};

function cor(t){
    t=t.toUpperCase();
    for(let k in CORES) if(t.includes(k)) return CORES[k];
    return "#fff";
}

function parseCSV(t){
    let l=[],r=[],c='',q=false;
    for(let ch of t){
        if(ch=='"') q=!q;
        else if(ch==','&&!q){r.push(c);c=''}
        else if(ch=='\n'&&!q){r.push(c);l.push(r);r=[];c=''}
        else c+=ch;
    }
    if(c) r.push(c);
    if(r.length) l.push(r);
    return l;
}

function trocarAba(m,btn){
    modalidade=m;
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');

    document.getElementById('semana-INTEGRADO').style.display = m==='INTEGRADO'?'block':'none';
    document.getElementById('semana-SUPERIOR').style.display = m==='SUPERIOR'?'block':'none';

    carregar();
}

async function carregar(){
    const url=`https://docs.google.com/spreadsheets/d/${SHEETS[modalidade].id}/export?format=csv&gid=${SHEETS[modalidade].gid}`;
    const txt=await (await fetch(url)).text();

    dados=parseCSV(txt);
    turmas=dados[0].slice(2);

    processar();
}

function processar(){
    semanas={};
    let dataAnt="";

    dados.slice(1).forEach(r=>{
        if(r[0]) dataAnt=r[0];
        r[0]=dataAnt;
        if(!r[0]) return;

        const [d,m,a]=r[0].split('/');
        const dt=new Date(a,m-1,d);
        const seg=new Date(dt.setDate(dt.getDate()-dt.getDay()+1));
        const key=seg.toLocaleDateString('pt-BR');

        if(!semanas[key]) semanas[key]=[];
        semanas[key].push(r);
    });

    const sel=document.getElementById('semana-'+modalidade);
    sel.innerHTML="";
    Object.keys(semanas).forEach(s=>sel.innerHTML+=`<option>${s}</option>`);
    sel.onchange=render;

    render();
}

function render(){
    const sem=document.getElementById('semana-'+modalidade).value;
    const linhas=semanas[sem];
    const cont=document.getElementById('tabela');

    // 🔥 filtrar turmas corretamente (coluna fixa)
    let tAtivas=turmas.filter((t,i)=>{
        return linhas.some(r=>{
            let v=(r[i+2]||"").trim();
            return v && v!=="-";
        });
    });

    if(modalidade==='INTEGRADO') tAtivas=turmas;

    const diasNome=["DOM","SEGUNDA-FEIRA","TERÇA-FEIRA","QUARTA-FEIRA","QUINTA-FEIRA","SEXTA-FEIRA","SÁBADO"];
    const ordem=["SEGUNDA-FEIRA","TERÇA-FEIRA","QUARTA-FEIRA","QUINTA-FEIRA","SEXTA-FEIRA","SÁBADO"];

    let dias={};

    linhas.forEach(r=>{
        const [d,m,a]=r[0].split('/');
        const dt=new Date(a,m-1,d);
        const nome=diasNome[dt.getDay()];
        if(dt.getDay()==0) return;

        if(!dias[nome]) dias[nome]={data:r[0],linhas:[]};
        dias[nome].linhas.push(r);
    });

    let html="";

    ordem.forEach(d=>{
        if(!dias[d]) return;

        html+=`<table>`;
        html+=`<tr class="day-divider"><td colspan="${tAtivas.length+1}">${d} - ${dias[d].data}</td></tr>`;

        html+=`<tr><th class="time-col">Horário</th>`;
        tAtivas.forEach(t=>html+=`<th style="background:${cor(t)}">${t}</th>`);
        html+=`</tr>`;

        dias[d].linhas.forEach(r=>{
            html+=`<tr>`;
            html+=`<td class="time-col">${r[1]}</td>`;
            tAtivas.forEach(t=>{
                const idx=dados[0].indexOf(t);
                html+=`<td style="background:${cor(t)}">${r[idx]||""}</td>`;
            });
            html+=`</tr>`;
        });

        html+=`</table>`;
    });

    cont.innerHTML=html;
}

function exportarPDF(){
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF('l');
    pdf.text("Horário "+modalidade,10,10);
    pdf.save("horario.pdf");
}

window.onload=carregar;
</script>

</body>
</html>
