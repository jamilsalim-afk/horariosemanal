<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horários IFRO - Cacoal (Compacto)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Redução global de fonte para caber mais dados */
        body { font-size: 12px; }
        .table-grade { table-layout: fixed; width: 100%; border-collapse: separate; border-spacing: 0; }
        .dia-header-sticky { position: sticky; top: 0; z-index: 30; }
        .turmas-header-sticky { position: sticky; top: 38px; z-index: 20; background-color: #f9fafb; }
        
        /* Cartão de aula ultra-compacto */
        .aula-card { 
            border-l-2 border-green-600;
            padding: 2px 4px;
            margin-bottom: 2px;
            background-color: #f0fdf4;
            border-radius: 2px;
            line-height: 1.1;
        }
        .nome-disciplina { font-weight: 700; font-size: 9px; color: #166534; display: block; }
        .nome-professor { font-size: 8px; color: #1d4ed8; display: block; margin-top: 1px; }

        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); display: none; justify-content: center; align-items: center; z-index: 100; flex-direction: column; }
        
        /* Ajuste de colunas de horário */
        .col-horario { width: 70px; font-size: 9px; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-2">

    <div id="loading" class="loading-overlay">
        <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-green-700 mb-2"></div>
        <p class="text-green-800 font-bold text-xs">Sincronizando...</p>
    </div>

    <div class="max-w-full mx-auto bg-white p-4 rounded-lg shadow-sm mb-4">
        <div class="flex flex-wrap justify-between items-center gap-4">
            <h1 class="text-lg font-bold text-green-800 flex items-center gap-2">
                📅 Grade Semanal IFRO
            </h1>
            <div class="flex gap-2">
                <input type="week" id="weekInputGeral" onchange="renderizarTudo()" class="rounded border-gray-300 p-1 text-xs border">
                <select id="nivelSelect" onchange="renderizarTudo()" class="rounded border-gray-300 p-1 text-xs border">
                    <option value="tecnico">Técnico</option>
                    <option value="superior">Superior</option>
                </select>
                <input type="text" id="buscaGeral" oninput="renderizarTudo()" placeholder="Professor..." class="rounded border-gray-300 p-1 text-xs border">
                <button onclick="carregarDadosPlanilha()" class="bg-green-700 text-white px-3 py-1 rounded text-xs hover:bg-green-800">
                    Sincronizar
                </button>
            </div>
        </div>
    </div>

    <div id="gradeGeralRender" class="space-y-6">
        </div>

    <script>
        const SHEET_ID = '1j33kiPqwtzZNuvkBgYDaIiXZvVMY_J0qWAtRfYGdnD8';
        const GID = '1589791808';
        const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}`;

        let dataStore = {};

        const GABARITO = [
            { h: "07:30 - 08:20", t: "aula" }, { h: "08:20 - 09:10", t: "aula" },
            { h: "09:10 - 09:30", t: "intervalo", l: "INTERVALO MATUTINO" },
            { h: "09:30 - 10:20", t: "aula" }, { h: "10:20 - 11:10", t: "aula" },
            { h: "11:10 - 12:00", t: "aula" },
            { h: "12:00 - 13:50", t: "intervalo", l: "ALMOÇO" },
            { h: "13:50 - 14:40", t: "aula" }, { h: "14:40 - 15:30", t: "aula" },
            { h: "15:30 - 15:50", t: "intervalo", l: "INTERVALO VESPERTINO" },
            { h: "15:50 - 16:40", t: "aula" }, { h: "16:40 - 17:30", t: "aula" },
            { h: "17:30 - 18:20", t: "aula" },
            { h: "18:20 - 19:00", t: "intervalo", l: "JANTAR" },
            { h: "19:00 - 19:50", t: "aula" }, { h: "19:50 - 20:40", t: "aula" },
            { h: "20:40 - 20:50", t: "intervalo", l: "INTERVALO NOTURNO" },
            { h: "20:50 - 21:40", t: "aula" }, { h: "21:40 - 22:30", t: "aula" }
        ];

        async function carregarDadosPlanilha() {
            document.getElementById('loading').style.display = 'flex';
            try {
                const response = await fetch(CSV_URL);
                const csvText = await response.text();
                parsearPlanilha(csvText);
                renderizarTudo();
            } catch (e) { alert("Erro ao carregar dados."); }
            finally { document.getElementById('loading').style.display = 'none'; }
        }

        function parsearPlanilha(csv) {
            const linhas = csv.split('\n').map(l => l.split(','));
            const newData = {};

            for (let i = 100; i < linhas.length; i++) {
                let [dataStr, hora, turma, disc, prof] = linhas[i];
                if (!dataStr || !turma || dataStr.trim() === "") continue;

                const partes = dataStr.includes('/') ? dataStr.split('/') : dataStr.split('-');
                const d = partes[0].trim().padStart(2, '0');
                const m = partes[1].trim().padStart(2, '0');
                let a = partes[2].trim();
                if(a.length === 2) a = "20" + a;
                const dataKey = `${a}-${m}-${d}`;

                turma = turma.trim().replace(/"/g, '');
                if (!newData[turma]) newData[turma] = { name: turma, lessons: [] };
                
                newData[turma].lessons.push({
                    dataKey: dataKey,
                    // Normalização do horário para comparação (remove espaços extras)
                    time: hora.trim().replace(/\s+/g, ''), 
                    disc: disc.replace(/"/g, '').trim(),
                    prof: prof?.replace(/"/g, '').trim() || "A Definir"
                });
            }
            dataStore = newData;
        }

        function renderizarTudo() {
            const weekVal = document.getElementById("weekInputGeral").value;
            if (!weekVal) return;

            const [ano, semana] = weekVal.split("-W").map(Number);
            const dataSegunda = getMonday(semana, ano);
            const nivel = document.getElementById("nivelSelect").value;
            const busca = document.getElementById("buscaGeral").value.toLowerCase();
            const render = document.getElementById("gradeGeralRender");

            const turmasFiltradas = Object.keys(dataStore).filter(tId => {
                const ehSup = /ads|pos|super|gestao/i.test(tId);
                return nivel === "superior" ? ehSup : !ehSup;
            }).sort();

            let html = "";
            const diasNome = ["SEGUNDA", "TERÇA", "QUARTA", "QUINTA", "SEXTA", "SÁBADO"];

            for (let i = 0; i < 6; i++) {
                const diaLoop = new Date(dataSegunda);
                diaLoop.setDate(dataSegunda.getDate() + i);
                const d = String(diaLoop.getDate()).padStart(2, '0');
                const m = String(diaLoop.getMonth() + 1).padStart(2, '0');
                const dataRef = `${diaLoop.getFullYear()}-${m}-${d}`;

                html += `
                <div class="bg-white rounded shadow-sm border border-gray-200 overflow-hidden">
                    <div class="dia-header-sticky bg-green-800 text-white p-2 font-bold flex justify-between items-center text-xs">
                        <span>${diasNome[i]} (${d}/${m})</span>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="table-grade">
                            <thead>
                                <tr class="turmas-header-sticky">
                                    <th class="p-1 border-b border-r col-horario text-gray-400 bg-gray-50">Horário</th>
                                    ${turmasFiltradas.map(t => `<th class="p-1 border-b border-r text-[10px] text-center uppercase truncate">${dataStore[t].name}</th>`).join("")}
                                </tr>
                            </thead>
                            <tbody>
                                ${gerarLinhas(turmasFiltradas, dataRef, busca, nivel)}
                            </tbody>
                        </table>
                    </div>
                </div>`;
            }
            render.innerHTML = html;
        }

        function gerarLinhas(turmas, dataRef, busca, nivel) {
            const slots = nivel === "tecnico" ? GABARITO.filter(s => s.h < "18:20") : GABARITO;

            return slots.map(slot => {
                if (slot.t === "intervalo") {
                    return `<tr class="bg-gray-50"><td class="p-1 border-b border-r text-center font-mono text-[8px] text-gray-400">${slot.h}</td><td colspan="${turmas.length}" class="p-1 border-b text-center text-[8px] font-bold text-gray-300 italic uppercase">${slot.l}</td></tr>`;
                }

                // Normaliza o horário do gabarito para comparação
                const hGabarito = slot.h.split(" - ")[0].trim().replace(/\s+/g, '');

                return `<tr>
                    <td class="p-1 border-b border-r bg-gray-50 font-mono text-[9px] font-bold text-center text-gray-500">${slot.h}</td>
                    ${turmas.map(tId => {
                        let aulasHtml = "";
                        dataStore[tId].lessons.forEach(aula => {
                            // CORREÇÃO: Verifica se a aula na planilha começa com o mesmo horário do gabarito
                            if (aula.dataKey === dataRef && aula.time.includes(hGabarito)) {
                                if (!busca || aula.prof.toLowerCase().includes(busca)) {
                                    aulasHtml += `
                                    <div class="aula-card">
                                        <span class="nome-disciplina">${aula.disc}</span>
                                        <span class="nome-professor">${aula.prof}</span>
                                    </div>`;
                                }
                            }
                        });
                        return `<td class="p-1 border-b border-r align-top min-h-[40px]">${aulasHtml}</td>`;
                    }).join("")}
                </tr>`;
            }).join("");
        }

        function getMonday(w, y) {
            const simple = new Date(y, 0, 1 + (w - 1) * 7);
            const dow = simple.getDay();
            const ISOweekStart = simple;
            if (dow <= 4) ISOweekStart.setDate(simple.getDate() - simple.getDay() + 1);
            else ISOweekStart.setDate(simple.getDate() + 8 - simple.getDay());
            return ISOweekStart;
        }
    </script>
</body>
</html>
