<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Horário Dinâmico IFRO</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 100%; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #2e7d32; text-align: center; margin-bottom: 25px; }
        
        .controls { display: flex; justify-content: center; margin-bottom: 20px; gap: 10px; }
        input { padding: 12px; width: 350px; border: 2px solid #2e7d32; border-radius: 25px; outline: none; }

        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th, td { border: 1px solid #dee2e6; padding: 12px; text-align: center; font-size: 13px; }
        th { background-color: #2e7d32; color: white; text-transform: uppercase; letter-spacing: 1px; }
        
        .dia-semana { background-color: #e8f5e9; font-weight: bold; color: #2e7d32; font-size: 15px; }
        .horario-col { background-color: #f8f9fa; font-weight: bold; width: 120px; }
        .highlight { background-color: #fbc02d !important; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>Quadro de Horários Integrado</h2>
    
    <div class="controls">
        <input type="text" id="filtro" placeholder="🔍 Pesquisar por Professor..." onkeyup="buscarProfessor()">
    </div>

    <div class="table-wrapper">
        <table id="tabelaHorario">
            <thead>
                <tr id="headerTurmas">
                    <th>Horário / Dia</th>
                    </tr>
            </thead>
            <tbody id="corpoTabela">
                </tbody>
        </table>
    </div>
</div>

<script>
    // URL DE EXPORTAÇÃO CSV DA SUA PLANILHA
    const sheetID = '1j33kiPqwtzZNuvkBgYDaIiXZvVMY_J0qWAtRfYGdnD8';
    const gid = '1357770092';
    const url = `https://docs.google.com/spreadsheets/d/${sheetID}/export?format=csv&gid=${gid}`;

    async function carregarDados() {
        try {
            const response = await fetch(url);
            const data = await response.text();
            renderizarTabela(data);
        } catch (error) {
            console.error("Erro ao ler a planilha:", error);
        }
    }

    function renderizarTabela(csv) {
        const linhas = csv.split('\n').map(row => row.split(','));
        const cabecalhoTurmas = document.getElementById('headerTurmas');
        const corpoTabela = document.getElementById('corpoTabela');

        // 1. Identificar Turmas Únicas (assumindo que a coluna de turmas é a 5ª)
        const turmas = [...new Set(linhas.slice(1).map(l => l[4]))].filter(t => t);
        turmas.forEach(turma => {
            let th = document.createElement('th');
            th.textContent = turma;
            cabecalhoTurmas.appendChild(th);
        });

        // 2. Agrupar por Dia e Horário
        const dias = ["SEGUNDA-FEIRA", "TERÇA-FEIRA", "QUARTA-FEIRA", "QUINTA-FEIRA", "SEXTA-FEIRA", "SÁBADO"];
        
        dias.forEach(dia => {
            // Linha divisória do dia
            let trDia = document.createElement('tr');
            trDia.className = 'dia-semana';
            trDia.innerHTML = `<td colspan="${turmas.length + 1}">${dia}</td>`;
            corpoTabela.appendChild(trDia);

            // Filtrar horários únicos para este dia
            const horariosNoDia = [...new Set(linhas.filter(l => l[0] === dia).map(l => l[1]))].sort();

            horariosNoDia.forEach(hora => {
                let tr = document.createElement('tr');
                tr.innerHTML = `<td class="horario-col">${hora}</td>`;

                turmas.forEach(turma => {
                    const aula = linhas.find(l => l[0] === dia && l[1] === hora && l[4] === turma);
                    tr.innerHTML += `<td class="celula-aula">${aula ? aula[2] + '<br><small>' + aula[3] + '</small>' : '-'}</td>`;
                });
                corpoTabela.appendChild(tr);
            });
        });
    }

    function buscarProfessor() {
        let busca = document.getElementById('filtro').value.toUpperCase();
        let celulas = document.querySelectorAll('.celula-aula');
        
        celulas.forEach(c => {
            if (busca !== "" && c.innerText.toUpperCase().includes(busca)) {
                c.classList.add('highlight');
            } else {
                c.classList.remove('highlight');
            }
        });
    }

    window.onload = carregarDados;
</script>

</body>
</html>
