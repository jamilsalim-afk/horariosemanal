<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Horários IFRO - DAPE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root { --primary: #2e7d32; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; overflow-x: hidden; }
        
        .header-sticky { position: sticky; top: 0; z-index: 2000; background: var(--bg); padding: 10px 15px; }
        .controls-card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; align-items: center; }
        
        select, .search-box, .btn-pdf { padding: 8px; border-radius: 6px; border: 1px solid #ddd; font-size: 13px; outline: none; }
        .search-box { width: 220px; border: 2px solid var(--primary); }
        .btn-pdf { background: #d32f2f; color: white; border: none; cursor: pointer; font-weight: bold; }

        .week-container { padding: 15px; width: 100%; box-sizing: border-box; }
        
        /* Container de Rolagem */
        .table-responsive { 
            width: 100%; 
            overflow-x: auto; 
            background: white; 
            border-radius: 8px; 
            border: 1px solid #ccc;
            margin-bottom: 30px;
            position: relative;
        }

        table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 10px; table-layout: fixed; }
        th, td { border: 0.5px solid #bbb; padding: 8px; text-align: center; word-wrap: break-word; white-space: normal; }

        /* Fixação da Coluna de Horário */
        .time-col { 
            position: sticky; 
            left: 0; 
            z-index: 100; 
            background: #f1f3f4 !important; 
            font-weight: bold; 
            width: 85px; 
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        }

        /* Fixação do Cabeçalho do Dia */
        .day-divider { 
            background: var(--primary); 
            color: white; 
            font-weight: bold; 
            font-size: 12px; 
            position: sticky;
            left: 0;
            z-index: 150;
        }

        .header-row th { background: #444; color: #fff; position: sticky; top: 0; z-index: 10; }
        .header-row th.time-col { z-index: 110; }

        /* Cores dos Cursos */
        .c-agroec { background-color: #e8f5e9 !important; } .c-agropec { background-color: #e3f2fd !important; }
        .c-info { background-color: #fff8e1 !important; } .c-geo { background-color: #f3e5f5 !important; }
        .c-mat { background-color: #e0f7fa !important; } .c-agroneg { background-color: #efebe9 !important; }
        .c-zoo { background-color: #fce4ec !important; } .c-agron { background-color: #f1f8e9 !important; }

        .highlight { background-color: #fbc02d !important; font-weight: bold; border: 2px solid #000; }
        .opaco { opacity: 0.1; }
        .intervalo { background: #f9f9f9; color: #aaa; font-style: italic; }
    </style>
</head>
<body>

<div class="header-sticky">
    <div class="controls-card">
        <select id="selectModalidade" onchange="init()">
            <option value="INTEGRADO">ENSINO INTEGRADO</option>
            <option value="SUPERIOR">ENSINO SUPERIOR</option>
        </select>
        <select id="selectSemana" onchange="renderizarTabela()"></select>
        <input type="text" id="searchProf" class="search-box" placeholder="🔍 Buscar Professor..." onkeyup="filtrarProfessor()">
        <button class="btn-pdf" onclick="exportarPDF()">📄 PDF Oficial</button>
    </div>
</div>

<div class="week-container">
    <div id="tabelaHorario"></div>
</div>

<script>
    const SHEETS = {
        INTEGRADO: { id: '1j33kiPqwtzZNuvkBgYDaIiXZvVMY_J0qWAtRfYGdnD8', gid: '1357770092' },
        SUPERIOR: { id: '14ALXZgFIT68ee9ajuIdG63SpGVm0HyTjwp63-J6vRyg', gid: '669887707' }
    };

    let dadosGlobais = [];
    let turmasDaPlanilha = [];
    let semanasAgrupadas = {};

    function parseCSV(text) {
        const lines = text.split(/\r?\n/);
        return lines.map(line => {
            const result = [];
            let current = '';
            let inQuotes = false;
            for (let i = 0; i < line.length; i++) {
                char = line[i];
                if (char === '"') inQuotes = !inQuotes;
                else if (char === ',' && !inQuotes) {
                    result.push(current.trim());
                    current = '';
                } else current += char;
            }
            result.push(current.trim());
            return result;
        });
    }

    async function init() {
        const mod = document.getElementById('selectModalidade').value;
        const url = `https://docs.google.com/spreadsheets/d/${SHEETS[mod].id}/export?format=csv&gid=${SHEETS[mod].gid}`;
        
        try {
            const response = await fetch(url);
            const csvText = await response.text();
            dadosGlobais = parseCSV(csvText);
            processarDados();
        } catch (e) { alert("Erro ao carregar dados."); }
    }

    function getCursoInfo(t) {
        t = t.toUpperCase();
        if (t.includes("AGROEC")) return { cl: "c-agroec", rgb: [232, 245, 233] };
        if (t.includes("AGROPEC")) return { cl: "c-agropec", rgb: [227, 242, 253] };
        if (t.includes("INFO")) return { cl: "c-info", rgb: [255, 248, 225] };
        if (t.includes("GEO")) return { cl: "c-geo", rgb: [243, 229, 245] };
        if (t.includes("MAT")) return { cl: "c-mat", rgb: [224, 247, 250] };
        if (t.includes("AGRONEG")) return { cl: "c-agroneg", rgb: [239, 235, 233] };
        if (t.includes("ZOO")) return { cl: "c-zoo", rgb: [252, 228, 236] };
        if (t.includes("AGRON")) return { cl: "c-agron", rgb: [241, 248, 233] };
        return { cl: "", rgb: [255, 255, 255] };
    }

    function processarDados() {
        semanasAgrupadas = {};
        if (dadosGlobais.length === 0) return;
        turmasDaPlanilha = dadosGlobais[0].slice(2).filter(t => t !== "").map(t => t.replace(/^"|"$/g, ''));

        let ultimaData = "";
        for (let i = 1; i < dadosGlobais.length; i++) {
            const row = [...dadosGlobais[i]];
            if (row[0] && row[0] !== "" && row[0] !== "-") ultimaData = row[0];
            row[0] = ultimaData;
            if (!row[0]) continue;
            const parts = row[0].split('/');
            if(parts.length < 3) continue;
            const dObj = new Date(parts[2], parts[1]-1, parts[0]);
            const diff = dObj.getDate() - dObj.getDay() + (dObj.getDay() === 0 ? -6 : 1);
            const segunda = new Date(dObj.setDate(diff)).toLocaleDateString('pt-BR');
            if (!semanasAgrupadas[segunda]) semanasAgrupadas[segunda] = { dias: {} };
            if (!semanasAgrupadas[segunda].dias[row[0]]) semanasAgrupadas[segunda].dias[row[0]] = [];
            semanasAgrupadas[segunda].dias[row[0]].push(row);
        }

        const select = document.getElementById('selectSemana');
        select.innerHTML = "";
        const sortedWeeks = Object.keys(semanasAgrupadas).sort((a,b) => a.split('/').reverse().join('').localeCompare(b.split('/').reverse().join('')));
        sortedWeeks.forEach(s => select.innerHTML += `<option value="${s}">Semana de ${s}</option>`);
        renderizarTabela();
    }

    function getTurmasAtivasNaSemana(diasDaSemana) {
        return turmasDaPlanilha.filter(tNome => {
            const idx = dadosGlobais[0].indexOf(tNome);
            return Object.values(diasDaSemana).some(diaArr => 
                diaArr.some(row => row[idx] && row[idx] !== "-" && !row[1].toUpperCase().includes("INTERVALO"))
            );
        });
    }

    function renderizarTabela() {
        const sem = document.getElementById('selectSemana').value;
        if (!semanasAgrupadas[sem]) return;
        const dias = semanasAgrupadas[sem].dias;
        const container = document.getElementById('tabelaHorario');
        const turmasAtivas = getTurmasAtivasNaSemana(dias);
        
        let html = "";
        Object.keys(dias).forEach(dia => {
            const p = dia.split('/');
            const dObj = new Date(p[2], p[1]-1, p[0]);
            const diasS = ["DOMINGO", "SEGUNDA-FEIRA", "TERÇA-FEIRA", "QUARTA-FEIRA", "QUINTA-FEIRA", "SEXTA-FEIRA", "SÁBADO"];
            
            html += `<div class="table-responsive"><table><thead>`;
            html += `<tr class="day-divider"><td colspan="${turmasAtivas.length + 1}">${diasS[dObj.getDay()]} - ${dia}</td></tr>`;
            html += `<tr class="header-row"><th class="time-col">Horário</th>`;
            turmasAtivas.forEach(t => html += `<th class="${getCursoInfo(t).cl}">${t}</th>`);
            html += `</tr></thead><tbody>`;

            dias[dia].forEach(row => {
                const isInt = row[1].toUpperCase().includes("INTERVALO");
                html += `<tr class="${isInt ? 'intervalo' : ''}"><td class="time-col">${row[1]}</td>`;
                turmasAtivas.forEach(tNome => {
                    const idx = dadosGlobais[0].indexOf(tNome);
                    const conteudo = (row[idx] || "-").replace(/^"|"$/g, '');
                    const cl = (conteudo !== "-" && !isInt) ? getCursoInfo(tNome).cl : "";
                    html += `<td class="aula-cell ${cl}">${conteudo}</td>`;
                });
                html += `</tr>`;
            });
            html += `</tbody></table></div>`;
        });
        container.innerHTML = html;
        filtrarProfessor();
    }

    function filtrarProfessor() {
        const termo = document.getElementById('searchProf').value.toUpperCase();
        const cells = document.getElementsByClassName('aula-cell');
        for (let i = 0; i < cells.length; i++) {
            const c = cells[i];
            c.classList.remove('highlight', 'opaco');
            if (termo !== "" && c.innerText !== "-") {
                if (c.innerText.toUpperCase().indexOf(termo) > -1) c.classList.add('highlight');
                else c.classList.add('opaco');
            }
        }
    }

    function exportarPDF() {
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF('l', 'mm', 'a4');
        const sem = document.getElementById('selectSemana').value;
        const diasObj = semanasAgrupadas[sem].dias;
        const turmasAtivas = getTurmasAtivasNaSemana(diasObj);
        const termo = document.getElementById('searchProf').value.toUpperCase();
        const mod = document.getElementById('selectModalidade').value;

        Object.keys(diasObj).forEach((dia, idx) => {
            if (idx > 0) pdf.addPage();
            const pageWidth = pdf.internal.pageSize.getWidth();
            pdf.setFontSize(8); pdf.setFont(undefined, 'bold');
            pdf.text("INSTITUTO FEDERAL DE EDUCAÇÃO, CIÊNCIA E TECNOLOGIA - CAMPUS CACOAL", pageWidth/2, 10, { align: 'center' });
            pdf.setFontSize(7); pdf.setFont(undefined, 'normal');
            pdf.text(`MODALIDADE: ${mod} | SEMANA DE ${sem}`, pageWidth/2, 14, { align: 'center' });

            const p = dia.split('/');
            const dObj = new Date(p[2], p[1]-1, p[0]);
            const diasS = ["DOMINGO", "SEGUNDA-FEIRA", "TERÇA-FEIRA", "QUARTA-FEIRA", "QUINTA-FEIRA", "SEXTA-FEIRA", "SÁBADO"];

            pdf.setFontSize(10); pdf.setTextColor(46, 125, 50);
            pdf.text(`${diasS[dObj.getDay()]} - ${dia}`, 7, 22);

            const tableBody = diasObj[dia].map(row => {
                const line = [row[1]];
                turmasAtivas.forEach(tNome => {
                    const originalIdx = dadosGlobais[0].indexOf(tNome);
                    let val = (row[originalIdx] || "-").replace(/^"|"$/g, '');
                    if (termo !== "" && !val.toUpperCase().includes(termo)) val = "";
                    line.push(val);
                });
                return line;
            });

            pdf.autoTable({
                head: [[ 'Horário', ...turmasAtivas ]],
                body: tableBody,
                startY: 25,
                margin: { left: 5, right: 5 },
                theme: 'grid',
                styles: { fontSize: turmasAtivas.length > 10 ? 4.5 : 5.5, halign: 'center', cellPadding: 0.5, overflow: 'linebreak' },
                headStyles: { fillColor: [46, 125, 50] },
                didParseCell: function(data) {
                    if (data.section === 'head' && data.column.index > 0) {
                        data.cell.styles.fillColor = getCursoInfo(turmasAtivas[data.column.index - 1]).rgb;
                        data.cell.styles.textColor = [0,0,0];
                    }
                    if (data.section === 'body' && data.column.index > 0 && data.cell.text[0] !== "-") {
                        data.cell.styles.fillColor = getCursoInfo(turmasAtivas[data.column.index - 1]).rgb;
                    }
                    if (data.section === 'body' && termo !== "" && data.cell.text[0].toUpperCase().includes(termo)) {
                        data.cell.styles.fillColor = [251, 192, 45];
                    }
                }
            });
        });
        pdf.save(`Horario_${mod}_${sem.replace(/\//g,'-')}.pdf`);
    }

    window.onload = init;
</script>

</body>
</html>
