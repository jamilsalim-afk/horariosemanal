<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Horários IFRO</title>

<style>
:root { --primary:#2e7d32; --bg:#f4f7f6; }
body { font-family:Segoe UI; background:var(--bg); margin:0; }

.ifro-header { position:sticky; top:0; background:white; border-bottom:4px solid var(--primary); }
.ifro-header-content { text-align:center; padding:10px; }
.ifro-linha1 { font-weight:bold; color:#2e7d32; }
.ifro-linha4 { color:#d32f2f; font-weight:bold; }

.tabs-header { display:flex; gap:5px; padding:10px; }
.tab-btn { padding:8px; border:1px solid #ccc; cursor:pointer; }
.tab-btn.active { border:2px solid var(--primary); }

.aba { display:none; }
.aba.active { display:block; }

.controls-fixed { padding:10px; display:flex; gap:10px; justify-content:center; }

table { width:100%; border-collapse:collapse; background:white; margin:20px 0; }
th, td { border:1px solid #bbb; padding:5px; text-align:center; }

.day-divider { background:var(--primary); color:white; font-weight:bold; }
.time-col { background:#eee; font-weight:bold; }

.intervalo { background:#e0e0e0; font-weight:bold; }
.opaco { opacity:0.2; }

.search-box { border:2px solid var(--primary); }
</style>
</head>

<body>

<div class="ifro-header">
    <div class="ifro-header-content">
        <div class="ifro-linha1">INSTITUTO FEDERAL DE RONDÔNIA</div>
        <div>CAMPUS CACOAL</div>
        <div>DEPARTAMENTO DE APOIO AO ENSINO</div>
        <div class="ifro-linha4">HORÁRIOS 2026</div>
    </div>
</div>

<div class="tabs-header">
    <button class="tab-btn active" onclick="trocarAba('INTEGRADO',this)">INTEGRADO</button>
    <button class="tab-btn" onclick="trocarAba('SUPERIOR',this)">SUPERIOR</button>
</div>

<div id="aba-INTEGRADO" class="aba active">
    <div class="controls-fixed">
        <select id="semana-INTEGRADO"></select>
        <input id="search-INTEGRADO" class="search-box" placeholder="Buscar professor">
    </div>
    <div id="tabela-INTEGRADO"></div>
</div>

<div id="aba-SUPERIOR" class="aba">
    <div class="controls-fixed">
        <select id="semana-SUPERIOR"></select>
        <input id="search-SUPERIOR" class="search-box" placeholder="Buscar professor">
    </div>
    <div id="tabela-SUPERIOR"></div>
</div>

<script>
const SHEETS = {
INTEGRADO:{id:'1j33kiPqwtzZNuvkBgYDaIiXZvVMY_J0qWAtRfYGdnD8',gid:'1357770092'},
SUPERIOR:{id:'14ALXZgFIT68ee9ajuIdG63SpGVm0HyTjwp63-J6vRyg',gid:'669887707'}
};

let modalidadeAtual='INTEGRADO';
let dados=[];
let turmas=[];
let semanas={};

// 🎨 CORES DOS CURSOS (como você queria)
const CORES = {
AGROEC:'#e8f5e9',
AGROPEC:'#e3f2fd',
INFO:'#fff8e1',
GEO:'#f3e5f5',
MAT:'#e0f7fa',
AGRONEG:'#efebe9',
ZOO:'#fce4ec',
AGRON:'#f1f8e9'
};

function getCor(nome){
    nome = nome.toUpperCase();
    if(nome.includes("AGROEC")) return CORES.AGROEC;
    if(nome.includes("AGROPEC")) return CORES.AGROPEC;
    if(nome.includes("INFO")) return CORES.INFO;
    if(nome.includes("GEO")) return CORES.GEO;
    if(nome.includes("MAT")) return CORES.MAT;
    if(nome.includes("AGRONEG")) return CORES.AGRONEG;
    if(nome.includes("ZOO")) return CORES.ZOO;
    if(nome.includes("AGRON")) return CORES.AGRON;
    return "white";
}

// CSV correto
function parseCSV(text){
    let linhas=[],linha=[],campo='',aspas=false;
    for(let c of text){
        if(c=='"') aspas=!aspas;
        else if(c==',' && !aspas){ linha.push(campo); campo=''; }
        else if(c=='\n' && !aspas){ linha.push(campo); linhas.push(linha); linha=[]; campo=''; }
        else campo+=c;
    }
    if(campo) linha.push(campo);
    if(linha.length) linhas.push(linha);
    return linhas;
}

function trocarAba(mod,btn){
    modalidadeAtual=mod;
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.aba').forEach(a=>a.classList.remove('active'));
    document.getElementById('aba-'+mod).classList.add('active');
    carregar();
}

async function carregar(){
    const url=`https://docs.google.com/spreadsheets/d/${SHEETS[modalidadeAtual].id}/export?format=csv&gid=${SHEETS[modalidadeAtual].gid}`;
    const txt=await (await fetch(url)).text();

    dados=parseCSV(txt);
    turmas=dados[0].slice(2);

    processar();
}

function processar(){
    semanas={};
    let ultimaData="";

    dados.slice(1).forEach(r=>{
        if(r[0] && r[0]!="-") ultimaData=r[0];
        r[0]=ultimaData;
        if(!r[0]) return;

        if(!semanas[r[0]]) semanas[r[0]]=[];
        semanas[r[0]].push(r);
    });

    const select=document.getElementById('semana-'+modalidadeAtual);
    select.innerHTML="";
    Object.keys(semanas).forEach(s=>select.innerHTML+=`<option>${s}</option>`);

    select.onchange=render;
    document.getElementById('search-'+modalidadeAtual).onkeyup=filtrar;

    render();
}

// 🔥 remove turmas vazias (CORRETO AGORA)
function turmasAtivas(linhas){
    return turmas.filter((t,i)=>{
        return linhas.some(r=>{
            const val = (r[i+2]||"").trim();
            return val && val !== "-" && val !== "";
        });
    });
}

function render(){
    const sem=document.getElementById('semana-'+modalidadeAtual).value;
    const cont=document.getElementById('tabela-'+modalidadeAtual);

    if(!semanas[sem]) return;

    const linhas=semanas[sem];

    // agrupar dias
    const diasOrdem = ["SEGUNDA","TERÇA","QUARTA","QUINTA","SEXTA","SÁBADO"];
    const dias={};

    linhas.forEach(r=>{
        const p=r[0].split('/');
        const d=new Date(p[2],p[1]-1,p[0]);
        const diaNome = ["DOM","SEGUNDA","TERÇA","QUARTA","QUINTA","SEXTA","SÁBADO"][d.getDay()];
        if(d.getDay()==0) return;

        if(!dias[diaNome]) dias[diaNome]=[];
        dias[diaNome].push(r);
    });

    const tAtivas = modalidadeAtual==='SUPERIOR' ? turmasAtivas(linhas) : turmas;

    let html="";

    diasOrdem.forEach(dia=>{
        if(!dias[dia]) return;

        html+=`<table>`;
        html+=`<tr class="day-divider"><td colspan="${tAtivas.length+1}">${dia}</td></tr>`;
        html+=`<tr><th>Horário</th>`;
        tAtivas.forEach(t=>html+=`<th style="background:${getCor(t)}">${t}</th>`);
        html+=`</tr>`;

        dias[dia].forEach(r=>{
            const inter=r[1].toUpperCase().includes("INTERVALO");

            html+=`<tr class="${inter?'intervalo':''}">`;
            html+=`<td class="time-col">${r[1]}</td>`;

            tAtivas.forEach(t=>{
                const idx=dados[0].indexOf(t);
                const val=r[idx]||"";
                html+=`<td style="background:${getCor(t)}">${val}</td>`;
            });

            html+=`</tr>`;
        });

        html+=`</table>`;
    });

    cont.innerHTML=html;
    filtrar();
}

function filtrar(){
    const termo=document.getElementById('search-'+modalidadeAtual).value.toUpperCase();
    document.querySelectorAll('#tabela-'+modalidadeAtual+' td').forEach(td=>{
        td.classList.toggle('opaco', termo && !td.innerText.toUpperCase().includes(termo));
    });
}

window.onload=carregar;
</script>

</body>
</html>
