<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Horários Semanais</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 20px;
  background: #f5f7fa;
}

.controls {
  margin-bottom: 20px;
}

select, input {
  padding: 8px;
  margin-right: 10px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

.card {
  background: white;
  border-radius: 10px;
  padding: 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  overflow-x: auto;
}

table {
  border-collapse: collapse;
  width: 100%;
  min-width: 900px;
}

th {
  background: #2c3e50;
  color: white;
  padding: 6px;
  font-size: 12px;
  position: sticky;
  top: 0;
  z-index: 3;
}

td {
  border: 1px solid #ddd;
  padding: 4px;
  text-align: center;
  font-size: 11px;
  height: 30px;
}

tr:nth-child(even) td {
  background-color: #fafafa;
}

/* coluna horário */
.col-horario {
  writing-mode: vertical-rl;
  text-orientation: mixed;
  font-weight: bold;
  background: #dfe6e9 !important;
  width: 35px;
}

/* fixar coluna */
td:first-child, th:first-child {
  position: sticky;
  left: 0;
  background: #ecf0f1;
  z-index: 2;
}

/* busca */
.highlight {
  background-color: #ffeaa7 !important;
  font-weight: bold;
}
</style>
</head>

<body>

<h2>Horários</h2>

<div class="controls">
  <select id="semana"></select>
  <input type="text" id="busca" placeholder="Buscar professor...">
</div>

<div class="card">
  <table id="tabela"></table>
</div>

<script>
const PLANILHA_ID = "1j33kiPqwtzZNuvkBgYDaIiXZvVMY_J0qWAtRfYGdnD8";

/* 🔥 SUAS SEMANAS (adicione as outras depois) */
const SEMANAS = {
  1: "1579045633",
  2: "491689833",
  3: "1240467307",
  4: "2044568281"
};

// montar select
const select = document.getElementById("semana");

Object.keys(SEMANAS).forEach(num => {
  const opt = document.createElement("option");
  opt.value = num;
  opt.textContent = "Semana " + num;
  select.appendChild(opt);
});

// carregar tabela
function carregarTabela() {
  const semana = document.getElementById("semana").value;
  const gid = SEMANAS[semana];

  if (!gid) {
    document.getElementById("tabela").innerHTML = "<tr><td>Semana não configurada</td></tr>";
    return;
  }

  const url = `https://docs.google.com/spreadsheets/d/${PLANILHA_ID}/gviz/tq?tqx=out:json&gid=${gid}`;

  fetch(url)
    .then(res => res.text())
    .then(text => {
      try {
        const json = JSON.parse(text.substring(47).slice(0, -2));
        montarTabela(json.table);
      } catch {
        document.getElementById("tabela").innerHTML = "<tr><td>Erro ao ler dados</td></tr>";
      }
    })
    .catch(() => {
      document.getElementById("tabela").innerHTML = "<tr><td>Erro de conexão</td></tr>";
    });
}

// montar tabela
function montarTabela(table) {
  const tabela = document.getElementById("tabela");
  tabela.innerHTML = "";

  const trHead = document.createElement("tr");

  const thHorario = document.createElement("th");
  thHorario.textContent = "Horário";
  trHead.appendChild(thHorario);

  table.cols.forEach((col, index) => {
    if (index === 0) return;

    const th = document.createElement("th");
    th.textContent = col.label || "";
    trHead.appendChild(th);
  });

  tabela.appendChild(trHead);

  table.rows.forEach(row => {
    const tr = document.createElement("tr");

    const horario = row.c[0] ? row.c[0].v : "";

    const tdHorario = document.createElement("td");
    tdHorario.className = "col-horario";
    tdHorario.textContent = horario;

    tr.appendChild(tdHorario);

    row.c.forEach((cell, index) => {
      if (index === 0) return;

      const td = document.createElement("td");
      const valor = cell ? cell.v : "";

      td.textContent = valor;

      if (valor) {
        td.setAttribute("data-prof", valor.toUpperCase());
      }

      tr.appendChild(td);
    });

    tabela.appendChild(tr);
  });
}

// busca
document.getElementById("busca").addEventListener("input", function() {
  const valor = this.value.toUpperCase();

  document.querySelectorAll("td").forEach(td => {
    td.classList.remove("highlight");

    if (!valor) return;

    if (td.dataset.prof && td.dataset.prof.includes(valor)) {
      td.classList.add("highlight");
    }
  });
});

// eventos
document.getElementById("semana").addEventListener("change", carregarTabela);

// iniciar
carregarTabela();
</script>

</body>
</html>
