<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Horários Semanais</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 20px;
  background: #f5f7fa;
}

h2 {
  margin-bottom: 15px;
}

.controls {
  margin-bottom: 20px;
}

select, input {
  padding: 10px;
  margin-right: 10px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

.card {
  background: white;
  border-radius: 10px;
  padding: 15px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

table {
  border-collapse: collapse;
  width: 100%;
}

th {
  background: #2c3e50;
  color: white;
  padding: 10px;
}

td {
  border: 1px solid #ddd;
  padding: 10px;
  text-align: center;
  height: 50px;
}

td:first-child {
  background: #ecf0f1;
  font-weight: bold;
}

tr:nth-child(even) td {
  background-color: #fafafa;
}

.highlight {
  background-color: #ffeaa7 !important;
  font-weight: bold;
}
</style>
</head>

<body>

<h2>Horários</h2>

<div class="controls">
  <select id="nivel">
    <option value="integrado">Integrado</option>
    <option value="superior1">Superior 1º</option>
    <option value="superior2">Superior 2º</option>
  </select>

  <select id="semana"></select>

  <input type="text" id="busca" placeholder="Buscar professor...">
</div>

<div class="card">
  <table id="tabela"></table>
</div>

<script>
const PLANILHA_ID = "1V8wZxnisgiFtCslx3YtyW01pVQfwcxKF7HBpXjrGBIE";

/*
 🔴 IMPORTANTE:
 Coloque aqui os GIDs de cada aba (semana)
*/
const SEMANAS = {
  integrado: {
    1: "1579045633",
    2: "COLE_GID_SEMANA_2",
    3: "COLE_GID_SEMANA_3"
    // até 40
  },
  superior1: {
    1: "COLE_GID"
  },
  superior2: {
    1: "COLE_GID"
  }
};

// Atualiza semanas
function atualizarSemanas() {
  const nivel = document.getElementById("nivel").value;
  const select = document.getElementById("semana");

  select.innerHTML = "";

  Object.keys(SEMANAS[nivel]).forEach(num => {
    const opt = document.createElement("option");
    opt.value = num;
    opt.textContent = "Semana " + num;
    select.appendChild(opt);
  });

  carregarTabela();
}

// Carrega dados
function carregarTabela() {
  const nivel = document.getElementById("nivel").value;
  const semana = document.getElementById("semana").value;

  const gid = SEMANAS[nivel][semana];

  const url = `https://docs.google.com/spreadsheets/d/${PLANILHA_ID}/gviz/tq?tqx=out:json&gid=${gid}`;

  fetch(url)
    .then(res => res.text())
    .then(text => {
      const json = JSON.parse(text.substring(47).slice(0, -2));
      montarTabela(json.table);
    });
}

// Monta tabela
function montarTabela(table) {
  const tabela = document.getElementById("tabela");
  tabela.innerHTML = "";

  // Cabeçalho
  const trHead = document.createElement("tr");
  table.cols.forEach(col => {
    const th = document.createElement("th");
    th.textContent = col.label || "";
    trHead.appendChild(th);
  });
  tabela.appendChild(trHead);

  // Linhas
  table.rows.forEach(row => {
    const tr = document.createElement("tr");

    row.c.forEach((cell, index) => {
      const td = document.createElement("td");
      const valor = cell ? cell.v : "";

      td.textContent = valor;

      if (valor && index !== 0) {
        td.setAttribute("data-prof", valor.toUpperCase());
      }

      tr.appendChild(td);
    });

    tabela.appendChild(tr);
  });
}

// Busca
document.getElementById("busca").addEventListener("input", function() {
  const valor = this.value.toUpperCase();

  document.querySelectorAll("td").forEach(td => {
    td.classList.remove("highlight");

    if (!valor) return;

    if (td.dataset.prof && td.dataset.prof.includes(valor)) {
      td.classList.add("highlight");
    }
  });
});

// Eventos
document.getElementById("nivel").addEventListener("change", atualizarSemanas);
document.getElementById("semana").addEventListener("change", carregarTabela);

// Iniciar
atualizarSemanas();
</script>

</body>
</html>
