<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Horários IFRO - Oficial</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root { --primary: #2e7d32; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        
        /* Controles */
        .controls-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; align-items: center; }
        select, .search-box, .btn-pdf { padding: 10px; border-radius: 8px; border: 1px solid #ddd; font-size: 14px; outline: none; }
        .search-box { width: 250px; border: 2px solid var(--primary); }
        .btn-pdf { background: #d32f2f; color: white; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-pdf:hover { background: #b71c1c; }

        /* Tabela */
        .week-container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; font-size: 10px; table-layout: fixed; margin-bottom: 25px; }
        th, td { border: 1px solid #ccc; padding: 6px; text-align: center; word-wrap: break-word; }
        
        /* Cores Integrado */
        .header-agroec { background-color: #c8e6c9 !important; color: #1b5e20; }
        .header-agropec { background-color: #bbdefb !important; color: #0d47a1; }
        .header-info { background-color: #ffecb3 !important; color: #ff6f00; }

        /* Cores Superior */
        .header-geo { background-color: #e1bee7 !important; color: #4a148c; }
        .header-mat { background-color: #b2ebf2 !important; color: #006064; }
        .header-agroneg { background-color: #d7ccc8 !important; color: #3e2723; }
        .header-zoo { background-color: #f8bbd0 !important; color: #880e4f; }
        .header-agron { background-color: #dcedc8 !important; color: #33691e; }

        .day-divider { background: var(--primary); color: white; font-weight: bold; font-size: 14px; height: 35px; }
        .time-col { font-weight: bold; width: 90px; background: #f1f3f4; color: #555; }
        
        .aula-cell { height: 45px; }
        .highlight { background-color: #fbc02d !important; font-weight: bold; color: #000; border: 2px solid #000; }
        .opaco { opacity: 0.15; }
        .intervalo { background: #f5f5f5; color: #999; font-style: italic; }
    </style>
</head>
<body>

<div class="controls-card">
    <select id="selectModalidade" onchange="processarDados()">
        <option value="INTEGRADO">ENSINO INTEGRADO</option>
        <option value="SUPERIOR">ENSINO SUPERIOR</option>
    </select>
    <select id="selectSemana" onchange="renderizarTabela()"></select>
    <input type="text" id="searchProf" class="search-box" placeholder="🔍 Filtrar Professor ou Aula..." onkeyup="filtrarProfessor()">
    <button class="btn-pdf" onclick="exportarPDF()">📄 PDF (1 Dia por Pág.)</button>
</div>

<div class="week-container">
    <h2 id="tituloSemana" style="text-align:center; color: var(--primary);"></h2>
    <div id="tabelaHorario"></div>
</div>

<script>
    const sheetID = '1j33kiPqwtzZNuvkBgYDaIiXZvVMY_J0qWAtRfYGdnD8';
    const gid = '1357770092'; 
    const url = `https://docs.google.com/spreadsheets/d/${sheetID}/export?format=csv&gid=${gid}`;

    let dadosGlobais = [];
    let turmasFiltradas = [];
    let semanasAgrupadas = {};

    async function init() {
        try {
            const response = await fetch(url);
            const csv = await response.text();
            dadosGlobais = csv.split('\n').map(r => r.split(',').map(c => c.replace(/"/g, '').trim()));
            processarDados();
        } catch (e) { alert("Erro ao carregar planilha."); }
    }

    function getTurmaStyle(t) {
        t = t.toUpperCase();
        if (t.includes("AGROEC")) return "header-agroec";
        if (t.includes("AGROPEC")) return "header-agropec";
        if (t.includes("INFO")) return "header-info";
        if (t.includes("GEO")) return "header-geo";
        if (t.includes("MAT")) return "header-mat";
        if (t.includes("AGRONEG")) return "header-agroneg";
        if (t.includes("ZOO")) return "header-zoo";
        if (t.includes("AGRON")) return "header-agron";
        return "";
    }

    function getRGB(t) {
        t = t.toUpperCase();
        if (t.includes("AGROEC")) return [200, 230, 201];
        if (t.includes("AGROPEC")) return [187, 222, 251];
        if (t.includes("INFO")) return [255, 236, 179];
        if (t.includes("GEO")) return [225, 190, 231];
        if (t.includes("MAT")) return [178, 235, 242];
        if (t.includes("AGRONEG")) return [215, 204, 200];
        if (t.includes("ZOO")) return [248, 187, 208];
        if (t.includes("AGRON")) return [220, 237, 200];
        return [240, 240, 240];
    }

    function processarDados() {
        semanasAgrupadas = {};
        const mod = document.getElementById('selectModalidade').value;
        
        // Identifica turmas da Linha 1 conforme modalidade
        turmasFiltradas = dadosGlobais[0].slice(2).filter(t => {
            if (mod === "INTEGRADO") return t.match(/AGROEC|AGROPEC|INFO/i);
            if (mod === "SUPERIOR") return t.match(/GEO|MAT|AGRONEG|ZOO|AGRON/i);
            return true;
        });

        let ultimaData = "";
        for (let i = 1; i < dadosGlobais.length; i++) {
            const row = [...dadosGlobais[i]];
            if (row[0] && row[0] !== "" && row[0] !== "-") ultimaData = row[0];
            row[0] = ultimaData;
            if (!row[0]) continue;

            const parts = row[0].split('/');
            const dateObj = new Date(parts[2], parts[1]-1, parts[0]);
            const diff = dateObj.getDate() - dateObj.getDay() + (dateObj.getDay() === 0 ? -6 : 1);
            const segunda = new Date(dateObj.setDate(diff)).toLocaleDateString('pt-BR');

            if (!semanasAgrupadas[segunda]) {
                semanasAgrupadas[segunda] = { date: new Date(dateObj), dias: {} };
            }
            if (!semanasAgrupadas[segunda].dias[row[0]]) semanasAgrupadas[segunda].dias[row[0]] = [];
            semanasAgrupadas[segunda].dias[row[0]].push(row);
        }

        const select = document.getElementById('selectSemana');
        select.innerHTML = "";
        Object.keys(semanasAgrupadas).sort((a,b) => a.split('/').reverse().join('').localeCompare(b.split('/').reverse().join(''))).forEach(s => {
            select.innerHTML += `<option value="${s}">Semana de ${s}</option>`;
        });
        renderizarTabela();
    }

    function renderizarTabela() {
        const sem = document.getElementById('selectSemana').value;
        if (!semanasAgrupadas[sem]) return;
        const dias = semanasAgrupadas[sem].dias;
        const container = document.getElementById('tabelaHorario');
        document.getElementById('tituloSemana').textContent = `QUADRO DE HORÁRIOS - SEMANA ${sem}`;

        let html = "";
        Object.keys(dias).forEach(dia => {
            html += `<table><thead><tr class="day-divider"><td colspan="${turmasFiltradas.length + 1}">${dia}</td></tr>`;
            html += `<tr><th style="background:#444; color:#fff">Horário</th>`;
            turmasFiltradas.forEach(t => html += `<th class="${getTurmaStyle(t)}">${t}</th>`);
            html += `</tr></thead><tbody>`;

            dias[dia].forEach(row => {
                const isInt = row[1].toUpperCase().includes("INTERVALO");
                html += `<tr class="${isInt ? 'intervalo' : ''}"><td class="time-col">${row[1]}</td>`;
                turmasFiltradas.forEach(tNome => {
                    const idx = dadosGlobais[0].indexOf(tNome);
                    html += `<td class="aula-cell">${row[idx] || "-"}</td>`;
                });
                html += `</tr>`;
            });
            html += `</tbody></table>`;
        });
        container.innerHTML = html;
        filtrarProfessor();
    }

    function filtrarProfessor() {
        const termo = document.getElementById('searchProf').value.toUpperCase();
        document.querySelectorAll('.aula-cell').forEach(c => {
            c.classList.remove('highlight', 'opaco');
            if (termo !== "") {
                if (c.innerText.toUpperCase().includes(termo) && c.innerText !== "-") c.classList.add('highlight');
                else c.classList.add('opaco');
            }
        });
    }

    function exportarPDF() {
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF('l', 'mm', 'a4');
        const sem = document.getElementById('selectSemana').value;
        const dias = semanasAgrupadas[sem].dias;
        const termo = document.getElementById('searchProf').value.toUpperCase();

        Object.keys(dias).forEach((dia, idx) => {
            if (idx > 0) pdf.addPage();
            pdf.setFontSize(14);
            pdf.setTextColor(46, 125, 50);
            pdf.text(`IFRO - ${dia}`, 14, 15);

            const tableBody = dias[dia].map(row => {
                const line = [row[1]];
                turmasFiltradas.forEach(tNome => {
                    const originalIdx = dadosGlobais[0].indexOf(tNome);
                    let val = row[originalIdx] || "-";
                    if (termo !== "" && !val.toUpperCase().includes(termo)) val = "";
                    line.push(val);
                });
                return line;
            });

            pdf.autoTable({
                head: [[ 'Horário', ...turmasFiltradas ]],
                body: tableBody,
                startY: 20,
                theme: 'grid',
                styles: { fontSize: 6.5, halign: 'center', cellPadding: 1 },
                headStyles: { fillColor: [46, 125, 50] },
                didParseCell: function(data) {
                    if (data.section === 'head' && data.column.index > 0) {
                        data.cell.styles.fillColor = getRGB(turmasFiltradas[data.column.index - 1]);
                        data.cell.styles.textColor = [0,0,0];
                    }
                    if (data.section === 'body' && termo !== "" && data.cell.text[0].toUpperCase().includes(termo)) {
                        data.cell.styles.fillColor = [251, 192, 45];
                    }
                }
            });
        });
        pdf.save(`Horario_IFRO_${sem.replace(/\//g,'-')}.pdf`);
    }

    window.onload = init;
</script>

</body>
</html>
