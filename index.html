<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Horários Institucionais</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 20px;
  background: #f4f6f9;
}

h2 {
  margin-bottom: 10px;
}

/* CONTROLES */
.controls {
  margin-bottom: 20px;
}

select, input {
  padding: 10px;
  margin-right: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

/* CONTAINER */
.card {
  background: white;
  border-radius: 10px;
  padding: 10px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.1);
  overflow-x: auto;
}

/* TABELA PRINCIPAL */
table {
  border-collapse: collapse;
  width: 100%;
  min-width: 900px;
}

/* CABEÇALHO FIXO */
th {
  position: sticky;
  top: 0;
  background: #1f2d3d;
  color: white;
  font-size: 12px;
  padding: 8px;
  z-index: 10;
  border-bottom: 2px solid #3498db;
}

/* CÉLULAS */
td {
  border: 1px solid #ddd;
  padding: 6px;
  text-align: center;
  font-size: 12px;
  height: 38px;
}

/* HORÁRIO */
td:first-child {
  background: #ecf0f1;
  font-weight: bold;
}

/* HOVER (FOCO VISUAL) */
td:hover {
  background-color: #dff9fb !important;
}

/* DESTAQUE BUSCA */
.highlight {
  background-color: #ffeaa7 !important;
  font-weight: bold;
}

/* MODO FOCO (JS controla opacidade) */
.dim {
  opacity: 0.2;
}

/* MELHORIA MOBILE */
@media (max-width: 768px) {
  td, th {
    font-size: 10px;
    padding: 4px;
  }
}
</style>
</head>

<body>

<h2>Horários Institucionais</h2>

<div class="controls">
  <input type="text" id="busca" placeholder="Buscar professor...">
</div>

<div class="card">
  <table id="tabela"></table>
</div>

<script>

const PLANILHA_ID = "1j33kiPqwtzZNuvkBgYDaIiXZvVMY_J0qWAtRfYGdnD8";

/* 🔥 EXEMPLO: ajuste para sua realidade */
const SEMANA_ATUAL = {
  gid: "1579045633"
};

// 🔥 FUNÇÃO PRINCIPAL
function carregar() {
  const url = `https://docs.google.com/spreadsheets/d/${PLANILHA_ID}/gviz/tq?tqx=out:json&gid=${SEMANA_ATUAL.gid}`;

  fetch(url)
    .then(r => r.text())
    .then(t => {
      const json = JSON.parse(t.substring(47).slice(0, -2));
      montar(json.table);
    });
}

// 🔥 MONTA TABELA (MODELO IFRO LIMPO)
function montar(table) {

  const tabela = document.getElementById("tabela");
  tabela.innerHTML = "";

  const turmas = table.cols.slice(1).map(c => c.label);

  let thead = "<tr><th>Horário</th>";

  turmas.forEach(t => {
    thead += `<th>${t}</th>`;
  });

  thead += "</tr>";

  let tbody = "";

  table.rows.forEach(row => {

    const horario = row.c[0] ? row.c[0].v : "";

    tbody += `<tr>`;
    tbody += `<td>${horario}</td>`;

    turmas.forEach((turma, i) => {

      const cell = row.c[i + 1];
      const valor = cell ? cell.v : "";

      if (valor) {
        tbody += `<td data-prof="${valor.toUpperCase()}">${valor}</td>`;
      } else {
        tbody += `<td></td>`;
      }
    });

    tbody += `</tr>`;
  });

  tabela.innerHTML = thead + tbody;
}

// 🔥 MODO FOCO (PROFESSOR)
function ativarFoco(valor) {

  document.querySelectorAll("td").forEach(td => {
    td.classList.remove("dim", "highlight");

    if (!valor) {
      td.style.opacity = "1";
      return;
    }

    if (td.dataset.prof && td.dataset.prof.includes(valor.toUpperCase())) {
      td.style.opacity = "1";
      td.classList.add("highlight");
    } else {
      td.style.opacity = "0.2";
    }
  });
}

// 🔥 BUSCA
document.getElementById("busca").addEventListener("input", function() {
  ativarFoco(this.value);
});

// iniciar
carregar();

</script>

</body>
</html>
