<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Horários Semanais</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 20px;
  background: #f5f7fa;
}

h2 {
  margin-bottom: 15px;
}

.controls {
  margin-bottom: 20px;
}

select, input {
  padding: 8px;
  margin-right: 10px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

/* CARD */
.card {
  background: white;
  border-radius: 10px;
  padding: 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  overflow-x: auto;
}

/* TABELA */
table {
  border-collapse: collapse;
  width: 100%;
  min-width: 900px;
}

/* CABEÇALHO */
th {
  background: #2c3e50;
  color: white;
  padding: 6px;
  font-size: 12px;
  position: sticky;
  top: 0;
  z-index: 3;
}

/* CÉLULAS */
td {
  border: 1px solid #ddd;
  padding: 4px;
  text-align: center;
  font-size: 11px;
  height: 30px;
}

/* LINHAS ALTERNADAS */
tr:nth-child(even) td {
  background-color: #fafafa;
}

/* COLUNA HORÁRIO */
.col-horario {
  writing-mode: vertical-rl;
  transform: rotate(180deg);
  text-align: center;
  font-weight: bold;
  background: #dfe6e9 !important;
  width: 35px;
}

/* FIXAR PRIMEIRA COLUNA */
td:first-child, th:first-child {
  position: sticky;
  left: 0;
  background: #ecf0f1;
  z-index: 2;
}

/* BUSCA */
.highlight {
  background-color: #ffeaa7 !important;
  font-weight: bold;
}
</style>
</head>

<body>

<h2>Horários</h2>

<div class="controls">
  <select id="nivel">
    <option value="integrado">Integrado</option>
    <option value="superior1">Superior 1º</option>
    <option value="superior2">Superior 2º</option>
  </select>

  <select id="semana"></select>

  <input type="text" id="busca" placeholder="Buscar professor...">
</div>

<div class="card">
  <table id="tabela"></table>
</div>

<script>
const PLANILHA_ID = "1j33kiPqwtzZNuvkBgYDaIiXZvVMY_J0qWAtRfYGdnD8";

/*
 🔴 COLOQUE AQUI OS GIDs DAS ABAS (SEMANAS)
*/
const SEMANAS = {
  integrado: {
    1: "1254464130"
    2: "2010171231"
    // 2: "GID_SEMANA_2",
    // ...
  },
  superior1: {},
  superior2: {}
};

// Atualiza semanas
function atualizarSemanas() {
  const nivel = document.getElementById("nivel").value;
  const select = document.getElementById("semana");

  select.innerHTML = "";

  Object.keys(SEMANAS[nivel]).forEach(num => {
    const opt = document.createElement("option");
    opt.value = num;
    opt.textContent = "Semana " + num;
    select.appendChild(opt);
  });

  carregarTabela();
}

// Carrega dados
function carregarTabela() {
  const nivel = document.getElementById("nivel").value;
  const semana = document.getElementById("semana").value;

  const gid = SEMANAS[nivel][semana];

  const url = `https://docs.google.com/spreadsheets/d/${PLANILHA_ID}/gviz/tq?tqx=out:json&gid=${gid}`;

  fetch(url)
    .then(res => res.text())
    .then(text => {
      const json = JSON.parse(text.substring(47).slice(0, -2));
      montarTabela(json.table);
    });
}

// Monta tabela
function montarTabela(table) {
  const tabela = document.getElementById("tabela");
  tabela.innerHTML = "";

  // Cabeçalho
  const trHead = document.createElement("tr");

  const thHorario = document.createElement("th");
  thHorario.textContent = "Horário";
  trHead.appendChild(thHorario);

  table.cols.forEach((col, index) => {
    if (index === 0) return; // ignora primeira coluna original

    const th = document.createElement("th");
    th.textContent = col.label || "";
    trHead.appendChild(th);
  });

  tabela.appendChild(trHead);

  // Linhas
  table.rows.forEach(row => {
    const tr = document.createElement("tr");

    // Horário (coluna fixa)
    const horario = row.c[0] ? row.c[0].v : "";

    const tdHorario = document.createElement("td");
    tdHorario.className = "col-horario";
    tdHorario.textContent = horario;

    tr.appendChild(tdHorario);

    // Demais colunas
    row.c.forEach((cell, index) => {
      if (index === 0) return;

      const td = document.createElement("td");
      const valor = cell ? cell.v : "";

      td.textContent = valor;

      if (valor) {
        td.setAttribute("data-prof", valor.toUpperCase());
      }

      tr.appendChild(td);
    });

    tabela.appendChild(tr);
  });
}

// Busca
document.getElementById("busca").addEventListener("input", function() {
  const valor = this.value.toUpperCase();

  document.querySelectorAll("td").forEach(td => {
    td.classList.remove("highlight");

    if (!valor) return;

    if (td.dataset.prof && td.dataset.prof.includes(valor)) {
      td.classList.add("highlight");
    }
  });
});

// Eventos
document.getElementById("nivel").addEventListener("change", atualizarSemanas);
document.getElementById("semana").addEventListener("change", carregarTabela);

// Iniciar
atualizarSemanas();
</script>

</body>
</html>
