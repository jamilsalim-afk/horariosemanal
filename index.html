<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horários IFRO - Cacoal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .table-grade { table-layout: fixed; width: 100%; border-collapse: separate; border-spacing: 0; }
        .dia-header-sticky { position: sticky; top: 0; z-index: 30; }
        .turmas-header-sticky { position: sticky; top: 48px; z-index: 20; background-color: #f9fafb; }
        .aula-card { border-l-4 border-green-600 p-2 mb-1 bg-green-50 rounded shadow-sm text-[10px] leading-tight; }
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); display: none; justify-content: center; align-items: center; z-index: 100; flex-direction: column; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4">

    <div id="loading" class="loading-overlay">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-green-700 mb-4"></div>
        <p class="text-green-800 font-bold">Sincronizando dados da planilha...</p>
    </div>

    <div class="max-w-7xl mx-auto bg-white p-6 rounded-xl shadow-md mb-8">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-green-800 flex items-center gap-2">
                📅 Grade de Horários Semanais
            </h1>
            <button onclick="carregarDadosPlanilha()" class="bg-green-700 text-white px-6 py-2 rounded-lg hover:bg-green-800 transition shadow-md">
                🔄 Sincronizar Dados
            </button>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-1">Escolha a Semana</label>
                <input type="week" id="weekInputGeral" onchange="renderizarTudo()" 
                       class="w-full rounded-lg border-gray-300 shadow-sm focus:border-green-500 p-2.5 border">
            </div>
            
            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-1">Nível do Curso</label>
                <select id="nivelSelect" onchange="renderizarTudo()" 
                        class="w-full rounded-lg border-gray-300 shadow-sm focus:border-green-500 p-2.5 border">
                    <option value="tecnico">Técnico Integrado</option>
                    <option value="superior">Superior / Noturno</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-1">Filtrar Docente</label>
                <input type="text" id="buscaGeral" oninput="renderizarTudo()" placeholder="Nome do professor..."
                       class="w-full rounded-lg border-gray-300 shadow-sm focus:border-green-500 p-2.5 border">
            </div>
        </div>
    </div>

    <div id="gradeGeralRender" class="max-w-full overflow-x-hidden space-y-12">
        <div class="text-center py-20 text-gray-400 border-2 border-dashed border-gray-200 rounded-xl">
            Selecione uma semana e clique em sincronizar.
        </div>
    </div>

    <script>
        const SHEET_ID = '1j33kiPqwtzZNuvkBgYDaIiXZvVMY_J0qWAtRfYGdnD8';
        const GID = '1589791808';
        const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}`;

        let dataStore = {};

        const GABARITO = [
            { h: "07:30 - 08:20", t: "aula" }, { h: "08:20 - 09:10", t: "aula" },
            { h: "09:10 - 09:30", t: "intervalo", l: "INTERVALO MATUTINO" },
            { h: "09:30 - 10:20", t: "aula" }, { h: "10:20 - 11:10", t: "aula" },
            { h: "11:10 - 12:00", t: "aula" },
            { h: "12:00 - 13:50", t: "intervalo", l: "ALMOÇO" },
            { h: "13:50 - 14:40", t: "aula" }, { h: "14:40 - 15:30", t: "aula" },
            { h: "15:30 - 15:50", t: "intervalo", l: "INTERVALO VESPERTINO" },
            { h: "15:50 - 16:40", t: "aula" }, { h: "16:40 - 17:30", t: "aula" },
            { h: "17:30 - 18:20", t: "aula" },
            { h: "18:20 - 19:00", t: "intervalo", l: "JANTAR" },
            { h: "19:00 - 19:50", t: "aula" }, { h: "19:50 - 20:40", t: "aula" },
            { h: "20:40 - 20:50", t: "intervalo", l: "INTERVALO NOTURNO" },
            { h: "20:50 - 21:40", t: "aula" }, { h: "21:40 - 22:30", t: "aula" }
        ];

        async function carregarDadosPlanilha() {
            document.getElementById('loading').style.display = 'flex';
            try {
                const response = await fetch(CSV_URL);
                const csvText = await response.text();
                parsearPlanilha(csvText);
                renderizarTudo();
            } catch (error) {
                alert("Erro ao carregar dados.");
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        function parsearPlanilha(csv) {
            const linhas = csv.split('\n').map(l => l.split(','));
            const newData = {};

            // Ignora linhas 2 a 100
            for (let i = 100; i < linhas.length; i++) {
                let [dataStr, hora, turma, disc, prof] = linhas[i];
                if (!dataStr || !turma || dataStr.trim() === "") continue;

                // Normaliza Data para String YYYY-MM-DD
                const partes = dataStr.includes('/') ? dataStr.split('/') : dataStr.split('-');
                const d = partes[0].trim().padStart(2, '0');
                const m = partes[1].trim().padStart(2, '0');
                let a = partes[2].trim();
                if(a.length === 2) a = "20" + a;
                const dataKey = `${a}-${m}-${d}`;

                turma = turma.trim().replace(/"/g, '');
                if (!newData[turma]) newData[turma] = { name: turma, discs: {} };
                
                const discName = disc.replace(/"/g, '').trim();
                if (!newData[turma].discs[discName]) {
                    newData[turma].discs[discName] = { name: discName, sch: [] };
                }

                newData[turma].discs[discName].sch.push({
                    dataKey: dataKey,
                    time: hora.trim(),
                    prof: prof?.replace(/"/g, '').trim() || "A Definir"
                });
            }
            dataStore = newData;
        }

        function renderizarTudo() {
            const weekVal = document.getElementById("weekInputGeral").value;
            if (!weekVal) return;

            const [ano, semana] = weekVal.split("-W").map(Number);
            const dataSegunda = getMondayOfSelectedWeek(semana, ano);
            const nivel = document.getElementById("nivelSelect").value;
            const busca = document.getElementById("buscaGeral").value.toLowerCase();
            const render = document.getElementById("gradeGeralRender");

            const turmasFiltradas = Object.keys(dataStore).filter(tId => {
                const ehSup = /ads|pos|super|gestao/i.test(tId);
                return nivel === "superior" ? ehSup : !ehSup;
            }).sort();

            let html = "";
            const diasNome = ["SEGUNDA", "TERÇA", "QUARTA", "QUINTA", "SEXTA", "SÁBADO"];

            for (let i = 0; i < 6; i++) {
                const diaLoop = new Date(dataSegunda);
                diaLoop.setDate(dataSegunda.getDate() + i);
                
                // Formata data do loop para bater com a dataKey da planilha
                const d = String(diaLoop.getDate()).padStart(2, '0');
                const m = String(diaLoop.getMonth() + 1).padStart(2, '0');
                const a = diaLoop.getFullYear();
                const dataRef = `${a}-${m}-${d}`;

                html += `
                <div class="bg-white rounded-xl shadow-lg border border-gray-200 mb-10 overflow-hidden">
                    <div class="dia-header-sticky bg-green-800 text-white p-4 font-bold flex justify-between items-center">
                        <span>${diasNome[i]}</span>
                        <span class="bg-green-600 px-3 py-1 rounded text-sm">${d}/${m}/${a}</span>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="table-grade">
                            <thead>
                                <tr class="turmas-header-sticky">
                                    <th class="p-3 border-b border-r w-24 text-[10px] text-gray-400 bg-gray-50">HORÁRIO</th>
                                    ${turmasFiltradas.map(t => `<th class="p-3 border-b border-r text-[11px] text-gray-700 text-center uppercase font-bold">${dataStore[t].name}</th>`).join("")}
                                </tr>
                            </thead>
                            <tbody>
                                ${gerarCorpo(turmasFiltradas, dataRef, busca, nivel)}
                            </tbody>
                        </table>
                    </div>
                </div>`;
            }
            render.innerHTML = html;
        }

        function gerarCorpo(turmas, dataRef, busca, nivel) {
            const slots = nivel === "tecnico" 
                ? GABARITO.filter(s => s.h.split(" - ")[0] < "18:20") 
                : GABARITO;

            return slots.map(slot => {
                if (slot.t === "intervalo") {
                    return `<tr class="bg-gray-50/50"><td class="p-2 border-b border-r text-center font-mono text-[9px] text-gray-400">${slot.h}</td><td colspan="${turmas.length}" class="p-2 border-b text-center text-[9px] uppercase font-bold text-gray-300 tracking-widest">${slot.l}</td></tr>`;
                }

                const horaRef = slot.h.split(" - ")[0];

                return `<tr>
                    <td class="p-3 border-b border-r bg-gray-50 font-mono text-[10px] font-bold text-center text-gray-500">${slot.h}</td>
                    ${turmas.map(tId => {
                        let aulasHtml = "";
                        Object.values(dataStore[tId].discs).forEach(d => {
                            d.sch.forEach(a => {
                                // Comparação de String pura: "2026-02-16" === "2026-02-16"
                                if (a.dataKey === dataRef && a.time.startsWith(horaRef)) {
                                    if (!busca || a.prof.toLowerCase().includes(busca)) {
                                        aulasHtml += `<div class="aula-card"><strong>${d.name}</strong><div class="text-blue-600 font-semibold mt-1">${a.prof}</div></div>`;
                                    }
                                }
                            });
                        });
                        return `<td class="p-1 border-b border-r align-top min-h-[60px]">${aulasHtml}</td>`;
                    }).join("")}
                </tr>`;
            }).join("");
        }

        function getMondayOfSelectedWeek(w, y) {
            const simple = new Date(y, 0, 1 + (w - 1) * 7);
            const dow = simple.getDay();
            const ISOweekStart = simple;
            if (dow <= 4) ISOweekStart.setDate(simple.getDate() - simple.getDay() + 1);
            else ISOweekStart.setDate(simple.getDate() + 8 - simple.getDay());
            return ISOweekStart;
        }
    </script>
</body>
</html>
