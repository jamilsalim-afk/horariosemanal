<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Horários IFRO - Fluxo Contínuo</title>
    <style>
        :root { --primary: #2e7d32; --secondary: #fbc02d; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        
        .controls-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; align-items: center; }
        select, .search-box { padding: 10px; border-radius: 8px; border: 1px solid #ddd; font-size: 14px; outline: none; }
        select { min-width: 220px; cursor: pointer; }
        .search-box { width: 250px; border: 2px solid var(--primary); }

        .week-container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: var(--primary); text-align: center; margin-top: 0; text-transform: uppercase; }

        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 1400px; font-size: 11px; table-layout: fixed; }
        th, td { border: 1px solid #eee; padding: 8px; text-align: center; word-wrap: break-word; }
        
        th { background: var(--primary); color: white; position: sticky; top: 0; height: 45px; z-index: 10; }
        .day-divider { background: #e8f5e9; font-weight: bold; color: var(--primary); text-align: center; font-size: 14px; height: 35px; }
        .time-col { font-weight: bold; width: 120px; background: #fafafa; color: #555; }
        
        .aula-cell { height: 50px; }
        .highlight { background-color: var(--secondary) !important; font-weight: bold; color: #000; }
        .intervalo { background: #f1f3f4; color: #777; font-style: italic; font-weight: bold; }
        .empty { color: #ddd; }
    </style>
</head>
<body>

<div class="controls-card">
    <div>
        <label>Modalidade: </label>
        <select id="selectModalidade" onchange="processarDados()">
            <option value="INTEGRADO">ENSINO INTEGRADO</option>
            <option value="SUPERIOR 1">SUPERIOR 1</option>
            <option value="SUPERIOR 2">SUPERIOR 2</option>
        </select>
    </div>
    <div>
        <label>Semana: </label>
        <select id="selectSemana" onchange="renderizarTabela()"></select>
    </div>
    <input type="text" id="searchProf" class="search-box" placeholder="🔍 Filtrar Professor ou Disciplina..." onkeyup="filtrarProfessor()">
</div>

<div class="week-container">
    <h2 id="tituloSemana">Carregando horários...</h2>
    <div id="tabelaHorario" class="table-wrapper"></div>
</div>

<script>
    const sheetID = '1j33kiPqwtzZNuvkBgYDaIiXZvVMY_J0qWAtRfYGdnD8';
    const gid = '1357770092';
    const url = `https://docs.google.com/spreadsheets/d/${sheetID}/export?format=csv&gid=${gid}`;

    let dadosGlobais = [];
    let turmasGlobais = [];
    let semanasAgrupadas = {};

    async function init() {
        try {
            const response = await fetch(url);
            const csv = await response.text();
            dadosGlobais = csv.split('\n').map(r => r.split(',').map(cell => cell.replace(/"/g, '').trim()));
            processarDados();
        } catch (e) {
            document.getElementById('tituloSemana').textContent = "Erro ao carregar dados.";
        }
    }

    function strToDate(s) {
        const p = s.split('/');
        return new Date(p[2], p[1] - 1, p[0]);
    }

    function getMonday(dateObj) {
        const d = new Date(dateObj);
        const day = d.getDay();
        const diff = d.getDate() - day + (day === 0 ? -6 : 1);
        return new Date(d.setDate(diff));
    }

    function processarDados() {
        semanasAgrupadas = {};
        turmasGlobais = dadosGlobais[0].slice(2).filter(t => t !== "");

        let ultimoDiaEncontrado = "";
        let ultimaDataEncontrada = "";

        for (let i = 1; i < dadosGlobais.length; i++) {
            const row = [...dadosGlobais[i]]; // Copia a linha
            let dataNaCelula = row[0];

            // LÓGICA DE PERSISTÊNCIA: Se a célula da data estiver vazia, usa a última encontrada
            if (dataNaCelula === "" || dataNaCelula === "-") {
                row[0] = ultimaDataEncontrada;
            } else {
                ultimaDataEncontrada = dataNaCelula;
            }

            if (!row[0]) continue;

            const dataObj = strToDate(row[0]);
            const segundaObj = getMonday(dataObj);
            const segundaStr = segundaObj.toLocaleDateString('pt-BR');

            if (!semanasAgrupadas[segundaStr]) {
                semanasAgrupadas[segundaStr] = { label: segundaStr, date: segundaObj, rows: [] };
            }
            semanasAgrupadas[segundaStr].rows.push(row);
        }

        const selectSemana = document.getElementById('selectSemana');
        selectSemana.innerHTML = "";

        const semanasOrdenadas = Object.values(semanasAgrupadas).sort((a, b) => a.date - b.date);

        semanasOrdenadas.forEach(s => {
            let opt = document.createElement('option');
            opt.value = s.label;
            opt.textContent = `Semana de ${s.label}`;
            selectSemana.appendChild(opt);
        });

        renderizarTabela();
    }

    function renderizarTabela() {
        const semanaAlvo = document.getElementById('selectSemana').value;
        if(!semanaAlvo) return;
        
        const dadosSemana = semanasAgrupadas[semanaAlvo].rows;
        const container = document.getElementById('tabelaHorario');
        document.getElementById('tituloSemana').textContent = `Horário Completo - Semana ${semanaAlvo}`;

        let html = `<table><thead><tr><th style="width:120px">Horário</th>`;
        turmasGlobais.forEach(t => html += `<th>${t}</th>`);
        html += `</tr></thead><tbody>`;

        let diaAtualParaExibicao = "";

        dadosSemana.forEach(row => {
            const dataRow = row[0];
            const horaRow = row[1];

            // Só cria o divisor visual quando a data realmente muda
            if (dataRow !== diaAtualParaExibicao) {
                diaAtualParaExibicao = dataRow;
                html += `<tr class="day-divider"><td colspan="${turmasGlobais.length + 1}">${dataRow}</td></tr>`;
            }

            const isIntervalo = horaRow.toUpperCase().includes("INTERVALO");
            html += `<tr class="${isIntervalo ? 'intervalo' : ''}">`;
            html += `<td class="time-col">${horaRow}</td>`;

            for (let j = 2; j < (turmasGlobais.length + 2); j++) {
                const conteudo = row[j] || "";
                const exibicao = (conteudo === "" || conteudo === "-") ? '<span class="empty">-</span>' : conteudo;
                html += `<td class="aula-cell">${exibicao}</td>`;
            }
            html += `</tr>`;
        });

        html += `</tbody></table>`;
        container.innerHTML = html;
    }

    function filtrarProfessor() {
        const termo = document.getElementById('searchProf').value.toUpperCase();
        document.querySelectorAll('.aula-cell').forEach(c => {
            const texto = c.innerText.toUpperCase();
            if (termo !== "" && texto.includes(termo) && texto !== "-") {
                c.classList.add('highlight');
            } else {
                c.classList.remove('highlight');
            }
        });
    }

    window.onload = init;
</script>

</body>
</html>
