<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Horários</title>

<style>
body {
  font-family: Arial;
  margin: 20px;
  background: #f4f6f9;
}

.controls {
  margin-bottom: 20px;
}

select, input {
  padding: 8px;
  margin-right: 10px;
}

/* GRID PRINCIPAL */
.container {
  display: flex;
  gap: 20px;
  overflow-x: auto;
}

/* BLOCO DE TURMA */
.bloco {
  background: white;
  border-radius: 10px;
  padding: 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

/* TABELA */
table {
  border-collapse: collapse;
}

th {
  background: #2c3e50;
  color: white;
  padding: 6px;
  font-size: 12px;
}

td {
  border: 1px solid #ddd;
  padding: 4px;
  text-align: center;
  font-size: 11px;
  height: 28px;
}

/* COLUNA HORÁRIO */
.horario {
  background: #ecf0f1;
  font-weight: bold;
  writing-mode: vertical-rl;
  transform: rotate(180deg);
}

/* BUSCA */
.highlight {
  background: #ffeaa7;
}
</style>
</head>

<body>

<h2>Horários</h2>

<div class="controls">
  <select id="semana"></select>
  <input type="text" id="busca" placeholder="Buscar professor...">
</div>

<div class="container" id="container"></div>

<script>
const PLANILHA_ID = "1j33kiPqwtzZNuvkBgYDaIiXZvVMY_J0qWAtRfYGdnD8";

const SEMANAS = {
  1: { gid: "1579045633", inicio: "2026-04-27" },
  2: { gid: "491689833", inicio: "2026-05-04" }
};

// montar select
const select = document.getElementById("semana");
Object.keys(SEMANAS).forEach(num => {
  const opt = document.createElement("option");
  opt.value = num;
  opt.textContent = "Semana " + num;
  select.appendChild(opt);
});

// função data
function adicionarDias(data, dias) {
  const d = new Date(data);
  d.setDate(d.getDate() + dias);
  return d.toISOString().split("T")[0];
}

// carregar dados
function carregar() {
  const semana = document.getElementById("semana").value;
  const { gid, inicio } = SEMANAS[semana];

  const url = `https://docs.google.com/spreadsheets/d/${PLANILHA_ID}/gviz/tq?tqx=out:json&gid=${gid}`;

  fetch(url)
    .then(r => r.text())
    .then(t => {
      const json = JSON.parse(t.substring(47).slice(0, -2));
      montar(json.table, inicio);
    });
}

// montar layout
function montar(table, inicioSemana) {
  const container = document.getElementById("container");
  container.innerHTML = "";

  const dias = ["Seg", "Ter", "Qua", "Qui", "Sex"];

  // identificar turmas (colunas)
  const turmas = table.cols.slice(1).map(c => c.label);

  turmas.forEach((turma, indexTurma) => {
    const bloco = document.createElement("div");
    bloco.className = "bloco";

    const tabela = document.createElement("table");

    // cabeçalho
    let thead = `<tr><th class="horario">Horário</th>`;

    dias.forEach((d, i) => {
      const data = adicionarDias(inicioSemana, i);
      thead += `<th>${d}<br>${data.slice(5)}</th>`;
    });

    thead += "</tr>";

    let tbody = "";

    table.rows.forEach(row => {
      const horario = row.c[0] ? row.c[0].v : "";

      tbody += `<tr><td class="horario">${horario}</td>`;

      dias.forEach((d, i) => {
        const cell = row.c[indexTurma + 1];
        const valor = cell ? cell.v : "";

        if (valor) {
          tbody += `<td data-prof="${valor.toUpperCase()}">${valor}</td>`;
        } else {
          tbody += `<td></td>`;
        }
      });

      tbody += "</tr>";
    });

    tabela.innerHTML = thead + tbody;

    const titulo = document.createElement("h3");
    titulo.textContent = turma;

    bloco.appendChild(titulo);
    bloco.appendChild(tabela);

    container.appendChild(bloco);
  });
}

// busca
document.getElementById("busca").addEventListener("input", function() {
  const valor = this.value.toUpperCase();

  document.querySelectorAll("td").forEach(td => {
    td.classList.remove("highlight");

    if (td.dataset.prof && td.dataset.prof.includes(valor)) {
      td.classList.add("highlight");
    }
  });
});

// eventos
document.getElementById("semana").addEventListener("change", carregar);

// iniciar
carregar();
</script>

</body>
</html>
